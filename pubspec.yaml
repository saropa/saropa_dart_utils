name: saropa_dart_utils

description: "280+ extension methods and utilities for Flutter/Dart. Null-safe string, DateTime, List, Map, and number operations that eliminate boilerplate."

version: 1.6.3

homepage: https://app.saropa.com

repository: https://github.com/saropa/saropa_dart_utils

issue_tracker: https://github.com/saropa/saropa_dart_utils/issues

documentation: https://pub.dev/documentation/saropa_dart_utils/latest/

environment:
  sdk: ">=3.9.0 <4.0.0" # detect: flutter doctor -v Dart version
  flutter: ">=3.41.4" # run: flutter upgrade

dependencies:
  # Provides grapheme (user-perceived character) cluster support for Dart strings.
  # https://pub.dev/packages/characters/changelog
  characters: ^1.4.0

  # Contains utility functions and classes in the style of dart:collection to make working with collections easier.
  # https://pub.dev/packages/collection/changelog
  collection: ^1.19.1

  flutter:
    sdk: flutter

  # International date formats. Required by the intl-coupled
  # date_time_intl_display_extensions module (locale-correct skeleton ordering
  # and 12h/24h clock detection). The rest of lib/datetime/ stays intl-free by
  # design; only that one opt-in module pulls intl.
  # https://pub.dev/packages/intl/changelog
  intl: ^0.20.2

  # Jiffy is a Flutter (Android, IOS and Web) date time package inspired by moment js for parsing, manipulating, querying and formatting dates
  # https://pub.dev/packages/jiffy/changelog
  jiffy: ^6.4.5

  # Annotations (@visibleForTesting, @immutable, ...) imported across lib/.
  # Must be a DIRECT dependency, not transitive: pub.dev rejects publishing a
  # package that imports a library it only depends on transitively. Leaving meta
  # transitive silently failed `dart pub publish` (exit 65) on every release
  # since 1.0.6. A bounded caret (not `any`) keeps pub.dev's score and avoids
  # resolving an incompatible major. https://pub.dev/packages/meta/changelog
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Parses lib/ via the Dart AST so tool/gen_capabilities.dart can enumerate
  # EVERY public declaration (not just doc-commented ones) for CAPABILITIES.md.
  # Already resolved transitively via saropa_lints/custom_lint at this version;
  # pinned here as a DIRECT dev_dependency because a tool/ script may not import
  # a transitive-only package (same publish rule that meta/fake_async document).
  analyzer: ^11.0.0

  # Controls virtual time in tests (debounce_utils_test, heartbeat_utils_test).
  # Must be a DIRECT dev_dependency, not transitive (it arrives via flutter_test):
  # pub.dev rejects publishing a package whose test/ imports a library it only
  # depends on transitively, failing `dart pub publish` with exit 65 (same class
  # of failure that the `meta` dependency above documents). Bounded caret matches
  # the version resolved through flutter_test. https://pub.dev/packages/fake_async
  fake_async: ^1.3.3

  # CLI tool for running custom lints
  # https://pub.dev/packages/custom_lint/changelog
  # NOTE: 0.8.1 - 2025-09-09 Support analyzer 8.0.0

  # 1,000+ lint rules for Flutter and Dart. Free. Open source.
  # https://pub.dev/packages/saropa_lints/changelog
  # e.g. dart run saropa_lints:init --tier essential
  #
  # EXACT-pinned (no caret) on purpose. A caret range let CI's fresh resolve
  # pull a newer patch that promoted a rule to WARNING severity, which then
  # failed `dart pub publish --dry-run` (exit 65) while the older local lock
  # showed nothing — the version drift behind the v1.6.0 publish whack-a-mole.
  # Pinning makes CI and local resolve the identical rule set; bump this line
  # deliberately to adopt new rules, then run `dart run custom_lint` before
  # tagging so any new WARNING is seen locally, not at publish time.
  # ignore: prefer_caret_version_syntax
  saropa_lints: ">=13.12.7 <15.0.0"

