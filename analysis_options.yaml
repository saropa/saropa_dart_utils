      prefer_never_over_always_throws: true  # [WARNING] The @alwaysThrows annotation from package:meta is deprecated since Dart 2.12. The Never return type provides the same guarantee at the language level — functions typed as Never cannot return normally, and the compiler uses this for flow analysis and dead-code detection. @alwaysThrows is only a hint that tooling may ignore. Migrate to a Never return type for stronger guarantees. {v1}
      prefer_null_aware_method_calls: true  # [INFO] Use null-aware operator (?.) instead of explicit null check and call.
      prefer_number_format: true  # [INFO] Number displayed without locale formatting. Different locales use different decimal/grouping separators. {v2}
      prefer_on_field_submitted: true  # [INFO] Form field must have onFieldSubmitted to handle keyboard action. This callback fires when the user presses the keyboard action button (e.g., Done, Next). Add it to move focus to the next field or submit the form for a smooth keyboard-driven workflow. {v3}
      prefer_on_pop_with_result: true  # [WARNING] The 'onPop' callback on Route and PopNavigatorRouterDelegateMixin was deprecated in Flutter 3.35.0 (PR #169700) in favor of 'onPopWithResult'. The deprecated 'onPop' callback does not receive the pop result value, which means callers cannot inspect or react to data returned by the popped route. The replacement 'onPopWithResult' provides the result as a parameter, enabling proper data flow between routes. {v1}
      prefer_overflow_bar_over_button_bar: true  # [INFO] Prefer OverflowBar instead of ButtonBar for Material action button rows. OverflowBar is the supported pattern for horizontal actions that reflow on overflow (Flutter 3.13.0, PR #128437). ButtonBar, ButtonBarThemeData, and ThemeData.buttonBarTheme were deprecated in Flutter 3.24.0 (PR #145523). Remove buttonBarTheme from ThemeData and migrate widgets to OverflowBar; theme ButtonBarThemeData has no direct replacement — apply spacing and alignment on OverflowBar or surrounding layout. {v2}
      prefer_overriding_parent_equality: true  # [WARNING] Subclass overrides == without incorporating the parent class equality check. If the parent class compares fields that the subclass ignores, two objects may be considered equal even though their parent fields differ, breaking the transitivity contract of ==. {v4}
      prefer_padding_over_container: true  # [INFO] Container with only padding creates unnecessary intermediate widgets (DecoratedBox, ConstrainedBox). Padding is a single-purpose widget with fewer allocations and faster layout. {v4}
      prefer_page_storage_key: true  # [INFO] Use PageStorageKey to preserve scroll position. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v5}
      prefer_pan_axis: true  # [WARNING] The 'alignPanAxis' parameter on InteractiveViewer was deprecated in Flutter 3.7 and removed after Flutter 3.19 (PR #142500). The boolean parameter only supported two modes (free or aligned). The replacement panAxis parameter uses a PanAxis enum that adds horizontal-only and vertical-only panning options. Use PanAxis.aligned instead of alignPanAxis: true, or PanAxis.free (the default) instead of alignPanAxis: false. {v1}
      prefer_platform_menu_bar_child: true  # [WARNING] The 'body' parameter on PlatformMenuBar was deprecated in Flutter 3.1 and removed after Flutter 3.16 (PR #138509). The parameter was renamed to follow the standard Flutter widget convention where the single child widget is named 'child'. Code using the old 'body' parameter will fail to compile on Flutter 3.19 and later. {v1}
      prefer_platform_widget_adaptive: true  # [INFO] Consider platform-adaptive widgets. Material-only UI on iOS (or Cupertino-only on Android) may feel inconsistent.
      prefer_positioned_directional: true  # [INFO] Use PositionedDirectional for RTL support. PositionedDirectional respects text direction for RTL languages. Positioned is used instead of PositionedDirectional. {v3}
      prefer_regex_validation: true  # [INFO] Form field with basic empty check but label suggests structured data (email/phone/url). Use regex validation. {v2}
      prefer_return_await: true  # [INFO] Returning a Future directly from an async function skips error propagation and stack trace preservation, making debugging harder. This can hide the source of exceptions and complicate error handling. {v6}
      prefer_reusing_assigned_local: true  # [INFO] A local variable already holds the result of this expression, but the identical expression is recomputed here instead of reusing that local. Recomputing wastes work and risks the two copies drifting apart if one is later edited. {v2}
      prefer_route_settings_name: true  # [INFO] MaterialPageRoute without RouteSettings.name. Analytics and debugging will be harder. {v2}
      prefer_safe_area_aware: true  # [INFO] Content may overlap device notch or system UI. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v4}
      prefer_scalable_text: true  # [INFO] Text uses a fixed font size and does not respect user accessibility settings. This prevents users who rely on larger text for readability from accessing your content. All text should scale with the system text scale factor for accessibility compliance. {v2}
      prefer_scrollbar_theme_of: true  # [INFO] Using Theme.of(context).scrollbarTheme can bypass a local ScrollbarTheme inherited higher in the tree. Flutter migrated to ScrollbarTheme.of(context) (PR #113237) so Scrollbar styling always resolves through the dedicated inherited theme first, with Theme fallback when absent. Prefer ScrollbarTheme.of(context) for correct theme resolution. {v1}
      prefer_semver_version: true  # [WARNING] pubspec.yaml version should follow semantic versioning (major.minor.patch).
      prefer_setup_teardown: true  # [INFO] Duplicated test setup code. Use setUp()/tearDown(). Repeated setup code in tests violates DRY and makes maintenance harder. Use setUp() and tearDown() for common test initialization. {v7}
      prefer_simpler_boolean_expressions: true  # [INFO] Boolean expression contains redundant negations or can be reduced using De Morgan's law. Complex negated compound expressions are harder to read and more error-prone during modification than their simplified equivalents. {v3}
      prefer_single_container: true  # [INFO] Nested decoration widgets could be a single Container. Using nested Padding, DecoratedBox, etc. is verbose when Container provides all these features in one widget. {v2}
      prefer_single_setstate: true  # [INFO] Multiple setState calls cause unnecessary rebuilds. Two or more setState calls are made on the same straight-line execution path. This increases build() cost, causing unnecessary widget rebuilds that degrade scroll performance. setState calls in separate closures (e.g. distinct onPressed handlers) or in mutually-exclusive branches (if/else arms, switch cases, try/catch) are not flagged because they can never both run in a single pass and cannot be merged. {v4}
      prefer_single_ticker_provider_state_mixin: true  # [INFO] This State class declares only one AnimationController but mixes in TickerProviderStateMixin, which exists for multi-ticker states and allocates a list for the additional tickers it will never receive here. SingleTickerProviderStateMixin is the framework default for single-controller state — cheaper at runtime and intent-revealing to any reader scanning the class header. {v1}
      prefer_sized_box_for_whitespace: true  # [INFO] Container creates unnecessary intermediate widgets (DecoratedBox, ConstrainedBox) when used only for whitespace. SizedBox is a single lightweight widget with fewer allocations and faster layout. {v3}
      prefer_skeleton_over_spinner: true  # [INFO] CircularProgressIndicator for content loading. Prefer skeleton loaders. This pattern increases maintenance cost and the likelihood of introducing bugs during future changes. {v2}
      prefer_sliver_app_bar: true  # [INFO] Use SliverAppBar inside CustomScrollView, not AppBar. SliverAppBar integrates with CustomScrollView for scroll-based effects like collapsing, floating, and pinning. {v5}
      prefer_sliver_list: true  # [WARNING] Use SliverList instead of ListView inside CustomScrollView. Using ListView inside CustomScrollView creates nested scrollables. Use SliverList for proper sliver composition. {v6}
      prefer_specific_cases_first: true  # [WARNING] General switch case appears before a more specific case. In Dart, the first matching case wins, so a broad pattern placed early shadows narrower patterns below it, making those specific cases unreachable dead code. {v4}
      prefer_spring_animation: true  # [INFO] CurvedAnimation with a physics-like curve (bounceOut, elasticOut, bounceIn, elasticIn, etc.) is being used where a SpringSimulation would produce smoother, more natural-feeling motion. CurvedAnimation uses a fixed duration that cannot respond to user input velocity, causing disconnects between gesture speed and animation behavior that feel artificial and jarring to users. {v2}
      prefer_sqflite_column_constants: true  # [INFO] String literal column name may contain typos. String literals for column names are error-prone. Use constants for compile-time checking. This file handling can cause data corruption, resource leaks, or permission errors. {v2}
      prefer_stream_distinct: true  # [INFO] Stream.listen() without .distinct() may process duplicate values unnecessarily. {v3}
      prefer_string_for_typeof_equals: true  # [WARNING] In Dart 3.2, dart:js_interop `typeofEquals` now takes String instead of JSString. Passing JSString-shaped arguments reflects the pre-3.2 API and should be migrated to plain Dart strings. {v1}
      prefer_system_theme_default: true  # [INFO] Hardcoded ThemeMode ignores user's OS dark mode preference. Using ThemeMode.light or ThemeMode.dark ignores user's OS preference. Default to ThemeMode.system to respect user settings, with option to override. {v3}
      prefer_tabbar_theme_indicator_color: true  # [WARNING] The 'indicatorColor' property on ThemeData was deprecated in Flutter 3.32.0 (PR #160024) as part of the Material Theme System Updates. Using ThemeData.indicatorColor directly bypasses the component-level theme system and will be removed in a future Flutter release. Migrate to TabBarThemeData.indicatorColor to keep tab indicator colors consistent with the Material Theme System. {v1}
      prefer_test_find_by_key: true  # [INFO] find.byType() is fragile. Use find.byKey() for reliable widget testing. Using find.byType can be fragile when widget structure changes. Using find.byKey with ValueKey or Key is more reliable and explicit. {v3}
      prefer_test_wrapper: true  # [INFO] Widget test should wrap with MaterialApp/CupertinoApp. Most widgets need MaterialApp ancestor for theming and localization. Note: This rule ignores teardown patterns where simple widgets like SizedBox, Container, or Placeholder are pumped to unmount the widget tree before disposal. {v4}
      prefer_text_input_action: true  # [INFO] TextField without textInputAction. Keyboard action button unclear. Setting textInputAction helps users navigate forms efficiently with the keyboard action button (Done, Next, Search, etc.). {v2}
      prefer_transform_over_container: true  # [INFO] Container with only transform must be a Transform. When Container only has a transform property, use Transform widget instead to improve semantics and performance. {v2}
      prefer_tween_sequence: true  # [INFO] Multiple chained animations are implemented without using TweenSequence, which can lead to complex, error-prone code and unpredictable animation timing. TweenSequence simplifies sequential animations, making them easier to manage and ensuring smooth transitions. Use TweenSequence for sequential property changes to improve maintainability and user experience. {v2}
      prefer_type_sync_over_is_link_sync: true  # [WARNING] FileSystemEntity.isLinkSync unconditionally returns false on Windows (documented dart:io behavior), which silently breaks cross-platform symbolic-link checks. Use FileSystemEntity.typeSync(path, followLinks: false) == FileSystemEntityType.link instead — it reports links correctly on Windows, macOS, and Linux. This bug is easy to miss because it only manifests when the code actually runs on Windows. {v1}
      prefer_typed_route_params: true  # [INFO] Route parameter from pathParameters or queryParameters is passed directly without type conversion. All route parameters are strings at runtime, and passing them where an int, double, or bool is expected causes type mismatch errors or silent data corruption. {v3}
      prefer_using_list_view: true  # [WARNING] Column inside SingleChildScrollView. A "Column" is being used inside a "SingleChildScrollView" Flutter to pre-render the entire list, bypassing "Lazy Loading" optimizations. This layout configuration can also trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v6}
      prefer_utf8_encode: true  # [INFO] Utf8Encoder().convert(x) is verbose and unnecessary. Since Dart 2.18 / Flutter 3.16 (PR #130567), utf8.encode(x) returns Uint8List directly and is the idiomatic replacement. The Utf8Encoder constructor form adds a needless intermediate object. Prefer the shorter utf8.encode(x) call from dart:convert for clarity and consistency with Dart SDK conventions. {v1}
      prefer_value_listenable_builder: true  # [INFO] Simple single-value state managed with setState causes the entire widget subtree to rebuild on every change. ValueListenableBuilder isolates rebuilds to only the affected subtree, significantly reducing unnecessary widget tree comparisons, improving frame rendering performance, and lowering battery consumption. {v4}
      prefer_video_loading_placeholder: true  # [INFO] Video player must have a loading placeholder. Video widgets should show a placeholder while loading to provide visual feedback and prevent layout shifts. {v2}
      prefer_visibility_over_opacity_zero: true  # [INFO] Using Opacity with a literal opacity of 0 or 0.0 hides the widget but still inserts an opacity compositing layer into the render tree, consuming GPU resources for nothing. The Visibility widget (available since Flutter 3.7) skips painting the child entirely when visible is false, avoiding compositing overhead and reducing the render tree. This pattern was adopted across the Flutter framework in PR #112191. {v1}
      prefer_where_or_null: true  # [INFO] Using firstWhere/lastWhere/singleWhere with an orElse callback is verbose and harder to read. The *OrNull variant from package:collection combined with ?? produces cleaner, more idiomatic Dart code. {v4}
      prefer_wrap_over_overflow: true  # [INFO] Row with many children may overflow - Use Wrap. DefaultTextStyle provides consistent typography without repeating styles. Text widgets are not wrapped with DefaultTextStyle. {v5}
      pubspec_package_name_convention: true  # [WARNING] Package name in pubspec.yaml does not follow the lowercase_with_underscores convention. Non-conforming names cause issues with pub.dev publishing, make imports harder to read, and violate the Dart ecosystem naming standard that all published packages follow. {v1}
      require_accessible_images: true  # [WARNING] Image element lacks accessibility handling, making it invisible to screen readers and users with visual impairments. Without a semanticLabel describing the image content, assistive technologies skip over it entirely, leaving users unable to understand the visual context. This violates WCAG 1.1.1 (Non-text Content), which requires all meaningful images to have a text alternative. {v2}
      require_analytics_error_handling: true  # [INFO] Analytics method call without error handling. Analytics SDKs (Firebase Analytics, Mixpanel, Amplitude) can throw when the SDK is not initialized, the network is unavailable, or event parameters are invalid. A failed analytics call should never crash the app or interrupt user workflows — wrap analytics calls in try-catch and silently log failures instead. {v1}
      require_auth_check: true  # [WARNING] Missing auth check allows unauthorized access to protected user data and privileged operations. {v5}
      require_autofill_hints: true  # [INFO] Form field must have autofillHints to improve user experience. The autofillHints parameter enables system autofill to help users complete forms faster. This improves UX especially for common fields like email, password, name, and address. {v2}
      require_avatar_alt_text: true  # [WARNING] Avatar or profile image is missing a semanticLabel or alt text. Screen readers cannot describe the image, making it inaccessible to users who rely on assistive technology. All meaningful images must have a descriptive label. {v2}
      require_avatar_fallback: true  # [WARNING] CircleAvatar with NetworkImage fails silently when image load fails. Users will see a broken or blank avatar with no indication of the error, leading to confusion, poor UX, and missed identity cues. This can also mask backend or connectivity issues during development. {v3}
      require_badge_count_limit: true  # [INFO] Badge count exceeds 99. Use "99+" pattern for large numbers. Large numbers in badges are hard to read and look unprofessional. The convention is to show "99+" for counts above 99. {v2}
      require_badge_semantics: true  # [WARNING] Badge or status indicator is missing accessibility semantics. Without a semantic label, screen readers cannot announce the badge count or its meaning to users with visual impairments, hiding important notification or status information from a significant portion of your users. {v4}
      require_ble_disconnect_handling: true  # [WARNING] BLE connections must handle disconnect events to maintain app stability and resource management. Ignoring disconnects can lead to stale UI (showing devices as connected when they are not), resource leaks (unreleased connections or streams), and user confusion when devices unexpectedly disappear or fail to reconnect. This can also cause battery drain and degraded reliability, especially in apps that manage multiple devices. {v3}
      require_bluetooth_state_check: true  # [WARNING] Bluetooth Low Energy (BLE) operations must check the adapter state before attempting connections, scans, or service discovery. Failing to check adapter state can result in failed connections, wasted battery due to repeated attempts, degraded user experience, and hard-to-debug errors—especially on devices where Bluetooth is disabled or unavailable. This can also cause your app to be rejected during app store review for reliability issues. {v3}
      require_button_loading_state: true  # [INFO] Button triggering an async operation without a loading state indicator leaves users unsure whether their tap was registered. They may tap again (causing duplicate requests), navigate away (abandoning the operation), or assume the app is frozen. A loading state provides essential feedback for async interactions. {v5}
      require_button_semantics: true  # [WARNING] Custom interactive elements (e.g., GestureDetector, InkWell) are missing Semantics with button: true. Without proper semantics, assistive technologies cannot identify these child elements as buttons, making them inaccessible to screen reader users who rely on the widget tree for navigation. {v2}
      require_cache_expiration: true  # [WARNING] Cache implementation lacks expiration logic. Caches without TTL serve stale data indefinitely. Implement expiration to ensure data freshness. Unreleased memory grows over time, increasing garbage collection pressure and risking out-of-memory crashes. {v2}
      require_cached_image_error_widget: true  # [INFO] CachedNetworkImage without error fallback. Broken images show nothing. Network images can fail. Always provide fallback for broken images. CachedNetworkImage is used without errorWidget/errorBuilder. {v2}
      require_cached_image_placeholder: true  # [INFO] CachedNetworkImage without placeholder. User sees blank during load. Placeholders provide visual feedback while the image loads. This image handling causes excessive memory usage, visual artifacts, or slow load times. {v2}
      require_calendar_timezone_handling: true  # [WARNING] device_calendar Event is missing an explicit timeZone. This can cause events to appear at the wrong time for users in different time zones, leading to missed or misaligned appointments. {v2}
      require_change_notifier_dispose: true  # [ERROR] Failing to dispose a ChangeNotifier (or ValueNotifier, etc.) in the dispose() method causes it to retain all listeners and references in the widget tree, resulting in memory leaks and potential crashes when notifications are sent to unmounted widgets. This is a common source of subtle bugs and degraded performance in Flutter apps. {v5}
      require_clipboard_paste_validation: true  # [INFO] Clipboard data used without validation. Pasted content can be unexpected format or malicious. Validate clipboard data before using it. This creates a security vulnerability that attackers can exploit to compromise user data or application integrity. {v2}
      require_connectivity_error_handling: true  # [WARNING] Connectivity check without error handling. checkConnectivity() can throw platform exceptions. {v2}
      require_connectivity_subscription_cancel: true  # [ERROR] If you do not cancel your connectivity subscription, your app will leak memory and system resources. This can cause crashes, slowdowns, and unpredictable behavior, especially after repeated hot reloads or navigation. {v3}
      require_currency_code_with_amount: true  # [INFO] Money amount without currency information. Amounts without currency are ambiguous. Always pair amounts with currency codes. This monetary calculation can produce rounding errors that accumulate, causing financial discrepancies. {v2}
      require_currency_formatting_locale: true  # [INFO] NumberFormat.currency() without a locale can format currency inconsistently for users. Currency formatting depends heavily on locale. Without explicit locale, the format may not match user expectations. {v2}
      require_dark_mode_testing: true  # [WARNING] MaterialApp missing darkTheme. App won't adapt to dark mode. Apps should support dark mode for accessibility and user preference. Without darkTheme, the app won't adapt when the user enables dark mode. {v2}
      require_database_close: true  # [WARNING] Unclosed database connection leaks resources and may exhaust connection pool, causing app failures. {v7}
      require_debouncer_cancel: true  # [ERROR] Uncanceled debounce timer fires after dispose, calling setState on unmounted widget causing crashes. {v1}
      require_deep_link_fallback: true  # [ERROR] Deep link handler navigates to content without verifying the target exists or is accessible. When a deep link references deleted, restricted, or invalid content, the app either crashes with a null reference error or displays a blank screen. Users tapping expired links in emails, notifications, or shared messages encounter a broken experience. {v9}
      require_default_text_style: true  # [INFO] Multiple sibling Text widgets repeat the same TextStyle, creating redundant style objects and making future style changes error-prone since each instance must be updated independently. DefaultTextStyle applies a shared style to all descendant Text widgets automatically, keeping the code DRY and consistent. {v5}
      require_deprecation_message: true  # [INFO] Deprecated annotation should include migration guidance. Missing documentation makes the API harder to use correctly and increases onboarding time. {v6}
      require_dialog_barrier_consideration: true  # [INFO] Destructive confirmation dialog (delete, remove, logout) defaults to barrierDismissible: true, allowing users to accidentally dismiss the dialog by tapping outside. This can silently skip the confirmation step, or worse, leave the user unsure whether the action was confirmed or canceled. {v2}
      require_dialog_barrier_dismissible: true  # [INFO] Default barrier behavior may allow accidental dismissal, losing unsaved user input. {v3}
      require_dialog_tests: true  # [INFO] Dialog test may be incomplete. Ensure pumpAndSettle after showing dialog. Dialogs require special handling: tap to open, find within dialog context, test dismiss behavior. Don't forget barrier dismiss tests. {v2}
      require_did_update_widget_check: true  # [INFO] didUpdateWidget triggers updates without checking if properties changed, causing unnecessary rebuilds. didUpdateWidget receives the old widget for comparison. Without comparing oldWidget to widget, you might trigger unnecessary updates. {v3}
      require_disabled_state: true  # [INFO] Button without custom disabled styling uses the framework default gray appearance, which may not match your app design system or provide sufficient contrast. Customizing the disabled state ensures visual consistency, communicates the disabled status clearly, and maintains your brand identity across all button states. {v5}
      require_dispose_implementation: true  # [WARNING] Controllers, subscriptions, or timers without cleanup cause memory leaks and setState errors. {v3}
      require_dispose_pattern: true  # [WARNING] Class has StreamController, AnimationController, or other disposable fields but no cleanup method. These controllers leak memory and can crash when accessed after disposal. {v4}
      require_drag_feedback: true  # [INFO] Draggable without a feedback widget shows no visual representation of the dragged item under the user finger/cursor. The original child disappears (replaced by childWhenDragging or nothing) while the drag area appears empty, making it impossible for the user to see what they are dragging or where to drop it. {v4}
      require_empty_results_state: true  # [INFO] List with search-related name missing empty state check. Search results should show a helpful message when no results are found. Empty ListView/GridView with no indicator confuses users. {v2}
      require_envied_obfuscation: true  # [WARNING] Envied environment variable generated without obfuscation stores secrets as plain text string constants in the compiled binary. Attackers can extract API keys, database URLs, and authentication tokens using basic reverse engineering tools, enabling unauthorized access to your backend services and third-party APIs. {v2}
      require_error_case_tests: true  # [INFO] Test file has no error case tests. Consider adding tests for exceptions. {v4}
      require_feature_flag_type_safety: true  # [INFO] Feature flag accessed with a raw string literal key. String-based lookups are error-prone: typos compile successfully but fail silently at runtime, renames require a fragile codebase-wide search-and-replace, and there is no compile-time guarantee the flag name exists. {v1}
      require_file_exists_check: true  # [INFO] File read operation should check exists() or use try-catch. File operations on non-existent files throw exceptions. Always verify the file exists or wrap in try-catch to handle missing files gracefully. {v3}
      require_form_auto_validate_mode: true  # [INFO] Form should specify autovalidateMode for consistent UX. Forms should specify how validation is triggered for consistent UX. The autovalidateMode parameter controls when the form fields validate. {v2}
      require_form_validation: true  # [WARNING] TextFormField inside a Form without a validator function bypasses the form validation pipeline entirely. Calling formKey.currentState.validate() will always return true for this field, allowing invalid or empty input to reach the backend, causing data integrity issues and poor user feedback. {v3}
      require_go_router_error_handler: true  # [INFO] GoRouter instance lacks an errorBuilder or errorPageBuilder parameter. When a user navigates to an undefined path via deep link, push notification, or typo, the router displays a blank white screen with no explanation or way to recover. {v3}
      require_go_router_fallback_route: true  # [ERROR] GoRouter configuration without errorBuilder or errorPageBuilder has no fallback for unmatched routes. When users navigate to a non-existent path via deep link, push notification, or typo, the router throws an unhandled exception that crashes the app instead of showing a helpful error page. {v2}
      require_golden_test: true  # [INFO] Add golden test for visual verification. Golden tests catch visual regressions automatically. Visual widgets must have golden tests. This weakens test quality, making failures harder to diagnose and reducing confidence in the test suite. {v3}
      require_google_fonts_fallback: true  # [WARNING] GoogleFonts should specify fontFamilyFallback. Google Fonts may fail to load on slow connections or offline. Without a fallback, text may be invisible or use system default unexpectedly. {v2}
      require_google_signin_error_handling: true  # [WARNING] Google Sign-In call without error handling crashes when the user cancels the sign-in flow, the network is unavailable, or Google Play Services are outdated. Users see an unhandled exception crash screen instead of a friendly error message, causing frustration and potential data loss in unsaved work. {v3}
      require_graphql_error_handling: true  # [WARNING] GraphQL query and mutation results must check hasException before accessing data. Failing to check for errors can cause runtime crashes, display incomplete or misleading data, and make debugging difficult. This is a common source of silent failures and poor user experience in apps using GraphQL. {v3}
      require_graphql_operation_names: true  # [INFO] Defining anonymous GraphQL queries, mutations, or subscriptions (without an operation name) makes debugging, error tracking, and persisted queries more difficult. Operation names are essential for identifying and managing GraphQL operations in large codebases and production environments. {v2}
      require_hero_tag_uniqueness: true  # [ERROR] Using duplicate Hero tags within the same navigation context causes Hero animations to fail, resulting in visual glitches and confusing user experiences. This can break navigation transitions and reduce the perceived quality of your app. Ensure each Hero tag is unique within a given Navigator to maintain smooth and predictable animations. See https://docs.flutter.dev/ui/animations/hero-animations#the-hero-tag. {v3}
      require_hover_states: true  # [INFO] Interactive widget on web/desktop without hover feedback feels unresponsive to mouse users. Hover states are a fundamental interaction pattern on these platforms, signaling clickability and providing visual confirmation that the cursor is over the target. Missing hover states make the app feel like a mobile port rather than a native desktop experience. {v6}
      require_http_status_check: true  # [WARNING] HTTP response body is used without first checking the status code. This can result in undetected failures, silent data corruption, or security issues if error responses are parsed as valid data. Always check if (response.statusCode == 200) before parsing response.body to ensure only successful responses are processed and errors are handled appropriately. {v5}
      require_https_over_http: true  # [ERROR] HTTP transmits data in plain text. Attackers can intercept credentials, tokens, and user data. {v1}
      require_image_description: true  # [WARNING] Image without semanticLabel is announced as "image" by screen readers, providing no useful information. {v2}
      require_image_error_builder: true  # [WARNING] Network image without errorBuilder shows a broken image icon or blank space when the URL is invalid, the server is down, or the network is unavailable. This creates a poor user experience with no indication of what went wrong and no way to retry loading the image. {v3}
      require_image_loading_placeholder: true  # [INFO] Image.network without loadingBuilder shows blank space during load. Network images take time to download. Without a loading indicator, users see an empty space which creates a poor user experience. {v4}
      require_image_semantics: true  # [WARNING] Image constructor lacks a semanticLabel parameter. Screen readers cannot describe this image to users with visual impairments, making the content inaccessible. This violates WCAG 1.1.1 (Non-text Content) and may exclude your app from accessibility-mandated markets. {v6}
      require_integration_test_setup: true  # [WARNING] Integration test missing IntegrationTestWidgetsFlutterBinding.ensureInitialized(). Integration tests need IntegrationTestWidgetsFlutterBinding.ensureInitialized() in main(). Without it, tests hang or crash on device. {v2}
      require_integration_test_timeout: true  # [WARNING] Integration test without timeout. May hang CI indefinitely. Long-running tests without timeouts can hang CI indefinitely. Always set timeouts on integration tests to catch infinite loops. {v2}
      require_interval_timer_cancel: true  # [ERROR] Timer.periodic without cancel(). Timer keeps firing after State disposal, draining battery and causing setState errors. {v2}
      require_intl_currency_format: true  # [WARNING] Currency value formatted manually using string interpolation with currency symbols. Symbol placement (prefix vs suffix), decimal separator (period vs comma), and digit grouping vary by locale. Manual formatting produces incorrect output for international users, causing financial confusion and misread amounts that undermine trust. {v3}
      require_intl_date_format_locale: true  # [WARNING] DateFormat created without an explicit locale parameter. The format output varies unpredictably across devices and platforms because each uses a different system default locale. Users in different regions see dates in unexpected formats (e.g., MM/DD/YYYY vs DD/MM/YYYY), leading to confusion about whether 01/02 means January 2nd or February 1st. {v2}
      require_json_decode_try_catch: true  # [WARNING] jsonDecode throws on malformed JSON. Unhandled exceptions can crash the app, cause silent data loss, and make debugging difficult. This is a common source of runtime errors in networked and user-input scenarios. {v2}
      require_key_for_collection: true  # [WARNING] List items in dynamic collections (ListView, GridView, etc.) must have a Key to preserve child widget state (e.g., TextField input, animations) when the list reorders or updates. Missing keys can cause UI bugs, loss of user input, broken animations, and confusing user experiences. This is a common source of hard-to-debug Flutter widget tree issues. {v4}
      require_keyboard_action_type: true  # [INFO] Text field must have textInputAction to improve UX. The textInputAction parameter controls the keyboard action button (e.g., Next, Done). This improves form navigation and UX. {v2}
      require_keyboard_dismiss_on_scroll: true  # [INFO] Scroll view must have keyboardDismissBehavior for form UX. ScrollViews containing text fields should specify how the keyboard dismisses when the user scrolls. This provides better UX for forms in scrollable content. {v2}
      require_keyboard_visibility_dispose: true  # [WARNING] Uncanceled subscription keeps firing callbacks after dispose, causing setState errors. {v2}
      require_location_timeout: true  # [WARNING] Location request without timeout can hang indefinitely if GPS is unavailable, freezing the app. {v3}
      require_logout_cleanup: true  # [WARNING] Incomplete logout cleanup leaves session tokens, cached user data, and authentication state accessible in local storage. On shared or stolen devices, the next user can access the previous account, personal data, and session tokens without re-authenticating, enabling unauthorized account access. {v4}
      require_long_press_callback: true  # [INFO] Interactive list item without onLongPress misses a standard mobile interaction pattern for secondary actions. Users expect long-press to reveal context menus, selection mode, or additional options. Omitting this leaves no discoverable path to bulk actions like delete, share, or move. {v3}
      require_mock_verification: true  # [INFO] Mock is stubbed but never verified. Creating mocks without verification means the test doesn't check behavior. This weakens test quality, making failures harder to diagnose and reducing confidence in the test suite. {v4}
      require_network_status_check: true  # [INFO] `[HEURISTIC]` Network call without connectivity check. Verify network status before making requests to avoid silent failures. {v3}
      require_notification_for_long_tasks: true  # [WARNING] Long-running operation detected without progress notification. Silent background work may be killed by OS. {v2}
      require_notification_handler_top_level: true  # [ERROR] If your notification handler is not a top-level function, background messages will be silently dropped when the app is terminated or in the background. Users will miss important notifications and your app may fail compliance checks. {v3}
      require_null_safe_extensions: true  # [WARNING] Extension method on a nullable type does not handle null receivers. This can cause runtime exceptions. Extension methods on nullable types should check for null. {v4}
      require_null_safe_json_access: true  # [ERROR] Accessing values from a JSON map without checking for key existence or null values can throw exceptions (such as NoSuchMethodError or TypeError) if the key is missing or the value is null. This is a common source of runtime crashes and unstable code, especially when dealing with data from APIs, user input, or external sources. Null-safe access is essential for robust, production-quality Dart and Flutter applications. {v4}
      require_number_format_locale: true  # [WARNING] NumberFormat without explicit locale. 1,234.56 vs 1.234,56 varies by device. Consequence: Numbers may be formatted incorrectly for users in different locales, leading to misinterpretation. {v3}
      require_openai_error_handling: true  # [WARNING] OpenAI API call without error handling crashes when the service returns rate limit errors (429), the API is temporarily unavailable (503), or the request exceeds token limits. Users see an unhandled exception crash screen instead of graceful fallback behavior, causing lost context and a broken experience. {v3}
      require_orientation_handling: true  # [INFO] MaterialApp without orientation handling. May break in landscape. This widget pattern increases complexity and makes the widget tree harder to maintain and debug. {v3}
      require_pagination_error_recovery: true  # [INFO] Paginated list has no visible error recovery. Failed page loads need a retry option so users can recover. {v1}
      require_pagination_loading_state: true  # [INFO] Paginated list triggers loadMore but shows no loading indicator. Infinite scroll lists should show a loading indicator when fetching the next page of results. {v2}
      require_pdf_error_handling: true  # [WARNING] PDF loading operation lacks try-catch error handling. PDF files can be corrupted, missing, or have invalid format. Without error handling, failures crash the application instead of showing user-friendly error messages. {v3}
      require_pdf_loading_indicator: true  # [INFO] PDF viewer should provide loading feedback. PDF loading can be slow, especially for large documents or over network. Users should see progress feedback during load. {v2}
      require_permission_permanent_denial_handling: true  # [WARNING] Permission request does not handle permanent denial. Users who permanently deny a permission are stuck with no way to re-enable it from within the app, causing frustration and feature abandonment. {v3}
      require_price_localization: true  # [INFO] Hardcoded price detected. Prices vary by region and currency. Users may see incorrect amounts. {v3}
      require_receive_port_close: true  # [ERROR] Leaving a ReceivePort open after it is no longer needed can cause memory leaks and keep isolates alive unnecessarily, leading to wasted resources and potential app instability. This can also prevent garbage collection of related objects. See https://dart.dev/guides/libraries/concurrency#isolates. {v2}
      require_refresh_indicator: true  # [INFO] List displaying remote data without pull-to-refresh forces users to navigate away and back to see updated content. This common UX pattern is expected on both platforms, and its absence makes the app feel unresponsive when data becomes stale. Users have no self-service way to recover from a failed initial load. {v5}
      require_refresh_indicator_on_lists: true  # [INFO] ListView without RefreshIndicator. Users can't pull to refresh. Pull-to-refresh is a standard mobile UX pattern. Lists with dynamic content should support manual refresh. {v3}
      require_request_timeout: true  # [WARNING] HTTP request is missing a timeout configuration, which means it may hang indefinitely if the server does not respond. This can cause the app to freeze, degrade user experience, and waste socket connections and memory. Always add .timeout(Duration(seconds: 30)) or configure timeout in client options to ensure requests fail gracefully and users are informed of network issues. {v4}
      require_responsive_breakpoints: true  # [INFO] Using magic numbers for breakpoints in MediaQuery makes code unclear and hard to maintain. Readers won’t know what the number means. {v2}
      require_resume_state_refresh: true  # [INFO] App handles paused state but not resumed, leaving UI stale after returning from background. When app returns from background, data may be stale and must be refreshed. Missing resumed handling leads to outdated UI. {v2}
      require_rtl_layout_support: true  # [WARNING] Hardcoded left/right directional value detected. This layout will render incorrectly for RTL (right-to-left) languages such as Arabic, Hebrew, Persian, and Urdu, affecting over 500 million users worldwide. Use directional equivalents (start/end) that automatically adapt to the text direction, ensuring your layout works correctly in both LTR and RTL contexts. {v1}
      require_safe_area_handling: true  # [INFO] Scaffold body without safe area handling allows content to render behind device notches, camera cutouts, rounded corners, and home indicators. On modern devices with non-rectangular displays, this causes text and interactive elements to be obscured or unreachable. {v2}
      require_safe_json_parsing: true  # [WARNING] JSON parsing may throw on missing keys. JSON parsing should handle missing or null values gracefully to avoid runtime exceptions. This weakens type safety, allowing errors to reach runtime where they crash instead of being caught at compile time. {v4}
      require_screen_size_tests: true  # [INFO] Widget test does not verify behavior at multiple screen sizes. Responsive layouts can break on different devices, and single-size tests miss overflow and layout errors at runtime. {v3}
      require_scroll_controller: true  # [INFO] Add ScrollController for scroll tracking. ScrollController is needed for infinite scroll and scroll position tracking. Scrollable lists must have a ScrollController. {v3}
      require_scroll_physics: true  # [INFO] Scrollable widget should specify scroll physics. This layout configuration can trigger RenderFlex overflow errors or unexpected visual behavior at runtime. {v5}
      require_search_loading_indicator: true  # [INFO] Search callback without loading state management. When triggering a search (API call), users need feedback that something is happening. Missing loading state causes confusion. {v2}
      require_secure_keyboard: true  # [WARNING] Password field detected without obscureText: true. The password is displayed as plain text on screen, exposing credentials to shoulder surfing attacks in public spaces. Nearby observers can read the password directly from the display, compromising user account security and violating OWASP M1 credential protection guidelines. {v3}
      require_secure_storage_auth_data: true  # [ERROR] Plaintext auth tokens enable session hijacking via device backup or physical access. {v3}
      require_secure_storage_error_handling: true  # [WARNING] Secure storage operation without error handling. May fail on some devices. {v3}
      require_semantic_label_icons: true  # [WARNING] Icon child element is missing a semanticLabel, making it invisible or meaningless to screen readers and assistive technologies. All icons that convey information or actions in the widget tree must have a descriptive semanticLabel for accessibility compliance. {v2}
      require_semantics_label: true  # [WARNING] This Semantics child element with a button, link, or other interactive role is missing a label, making it inaccessible to screen readers. Without a label, users cannot understand the purpose of the interactive element, which reduces usability and fails accessibility standards. Labels are essential for describing the action or purpose of interactive elements in the widget tree. {v5}
      require_shared_prefs_key_constants: true  # [INFO] String literal used as SharedPreferences key. Use named constants. Using string literals for keys is error-prone and makes refactoring difficult. Define keys as constants for type safety and easier maintenance. {v4}
      require_shared_prefs_null_handling: true  # [WARNING] SharedPreferences getter with null assertion (!) crashes with a NoSuchMethodError if the key does not exist. This is a common source of production crashes on first launch, after app updates that add new preference keys, or when storage is cleared by the OS under memory pressure. {v3}
      require_snackbar_duration: true  # [INFO] Default duration varies by platform, causing inconsistent UX across devices. {v3}
      require_socket_close: true  # [ERROR] Not closing a Socket keeps the TCP connection open indefinitely, occupying server connection slots, leaking file descriptors, and potentially exhausting OS resources. This can prevent new network connections and degrade app or system performance. {v2}
      require_step_count_indicator: true  # [INFO] Multi-step flow with 3+ conditional step views lacks a progress indicator. Users have no visibility into how many steps remain, leading to abandonment when the process feels open-ended. {v2}
      require_stepper_validation: true  # [INFO] Stepper onStepContinue callback does not validate form input before proceeding. This can allow users to advance with incomplete or invalid data, leading to errors or inconsistent state. {v3}
      require_stream_error_handling: true  # [WARNING] Stream.listen() is called without providing an onError callback or wrapping the stream in a try-catch. Unhandled stream errors propagate as uncaught exceptions, which crash your app in production and terminate the stream connection permanently, preventing any further data from being received. {v2}
      require_super_dispose_call: true  # [ERROR] Missing super.dispose() prevents parent State cleanup, causing memory leaks and broken widget lifecycle. {v1}
      require_super_init_state_call: true  # [ERROR] Missing super.initState() skips parent initialization, breaking framework contracts and causing subtle bugs. {v2}
      require_svg_error_handler: true  # [WARNING] SvgPicture without errorBuilder shows blank on invalid SVG. SVG loading can fail for various reasons. Without an error builder, the UI may break or show nothing when an SVG fails to load. {v3}
      require_test_assertions: true  # [WARNING] Test has no assertions. Tests without assertions don't actually verify anything. This rule uses simple string matching on the test body source code for fast detection. {v4}
      require_test_isolation: true  # [WARNING] Mutable top-level variable may cause test coupling. Tests must not share mutable state. Use setUp/tearDown to reset state between tests for proper isolation. {v4}
      require_text_input_type: true  # [INFO] TextField without keyboardType. Users may see wrong keyboard. Setting the appropriate keyboardType improves user experience by showing the right keyboard layout for the expected input. {v2}
      require_text_overflow_handling: true  # [WARNING] Text displaying dynamic content (user input, API data, translations) without overflow handling can break layouts when the text is longer than expected. Unbounded text pushes sibling widgets off-screen, triggers RenderFlex overflow errors in Row/Column contexts, and creates inconsistent UI across locales with varying text lengths. {v3}
      require_text_scale_factor_awareness: true  # [WARNING] Fixed-height container with Text child may clip or overflow when users increase text scale. Use flexible layout or minHeight instead. {v1}
      require_timer_cancellation: true  # [WARNING] Timer or StreamSubscription must be canceled in dispose(). Timers and stream subscriptions that aren't canceled will continue running after the widget is disposed, causing: - Crashes if they call setState on a disposed widget - Memory leaks from retained references - Wasted CPU cycles. {v5}
      require_timezone_display: true  # [INFO] DateFormat includes time components but no timezone indicator. Users may misinterpret displayed times when the timezone is ambiguous, leading to missed appointments, incorrect scheduling, and poor user experience across time zones. {v1}
      require_url_launcher_encoding: true  # [WARNING] URL passed to launchUrl or canLaunchUrl contains string interpolation without Uri.encodeComponent(). Unencoded special characters (spaces, ampersands, Unicode) produce malformed URLs that fail to open, display incorrect content, or enable URL injection attacks where user input manipulates the destination path or query parameters. {v2}
      require_validator_return_null: true  # [ERROR] Non-null return on valid input shows error message even when field is correct, confusing users. Validator functions in forms must return null for valid input. Returning a non-null value causes error messages to display even when the field is correct, leading to user frustration and broken form validation. {v3}
      require_video_player_controller_dispose: true  # [ERROR] When a State class creates a VideoPlayerController for a video widget (such as a video player, gallery, carousel, or story view) and does not dispose of it in dispose(), the controller will keep video and audio resources alive after the widget is removed from the widget tree. This can cause memory leaks, background playback, battery drain, and even prevent other apps from acquiring audio focus. In video-heavy UIs or dynamic lists, this can quickly exhaust device resources and degrade app performance. Always dispose of every VideoPlayerController in the owning State object’s dispose() method to ensure proper cleanup. See: https://pub.dev/packages/video_player#disposing {v3}
      require_websocket_error_handling: true  # [WARNING] WebSocket stream.listen() is missing an onError handler. Unhandled errors can crash your app, disconnect users, and make debugging network issues difficult. All WebSocket listeners must handle errors to ensure robust, production-quality networking. {v3}
      require_widgets_binding_callback: true  # [WARNING] showDialog/showModalBottomSheet in initState without addPostFrameCallback may fail. {v2}
      require_workmanager_for_background: true  # [WARNING] Periodic task detected without workmanager. Dart isolates die when app backgrounds. Use workmanager for reliable background tasks. {v2}
      require_wss_over_ws: true  # [ERROR] ws:// transmits data unencrypted. Attackers can intercept, read, and modify WebSocket messages in transit. {v1}
      secure_pubspec_urls: true  # [WARNING] Insecure URL (http:// or git://) found in pubspec.yaml dependency source. Plain HTTP and unencrypted git:// URLs are vulnerable to man-in-the-middle attacks that could inject malicious code into your dependencies. Always use https:// for dependency URLs to ensure integrity and authenticity. {v1}
      use_setstate_synchronously: true  # [WARNING] setState called after async gap without mounted check. Quick fix available: Wraps the setState call in if (mounted) { .. }. This violates the widget lifecycle, risking setState-after-dispose errors or silent state corruption. {v11}
      use_truncating_division: true  # [WARNING] Prefer truncating division (`~/`) instead of `/` followed by `.toInt()`.

      #
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #   ◆ STYLISTIC RULES (OPT-IN)
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #
      # Formatting, ordering, naming conventions.
      # Enable with: dart run saropa_lints:init --tier <tier> --stylistic-all

      #
      # ┌─────────────────────────────────────────────────────────────────┐
      # │  ✓ ENABLED STYLISTIC (52 rules)                                         │
      # └─────────────────────────────────────────────────────────────────┘
      #
      avoid_parameter_reassignment: true  # Parameter is being reassigned. This hides the original input value. {v3}
      binary_expression_operand_order: true  # Preferring a specific operand order in binary expressions is a stylistic convention. Both orderings produce equivalent compiled code. Enable via the stylistic tier. {v3}
      double_literal_format: true  # Formatting double literals in a specific way (e.g., 1.0 vs 1.) is a stylistic preference. All forms represent the same value with no performance difference. Enable via the stylistic tier. {v4}
      no_boolean_literal_compare: true  # Comparing a boolean to true/false literally (x == true) instead of using the value directly (x) is a stylistic choice with no correctness or performance impact. Enable via the stylistic tier. {v3}
      prefer_arrow_functions: true  # Function body contains only a single return statement. Block syntax adds unnecessary braces and visual noise for simple expressions; convert to arrow syntax (=>) to signal a pure, single-expression return. {v3}
      prefer_await_over_then: true  # The .then() chain obscures sequential async logic and complicates error handling. Rewrite with await for clearer control flow. {v3}
      prefer_blank_line_before_constructor: true  # Adding blank lines before constructors is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v4}
      prefer_blank_line_before_method: true  # Adding blank lines before methods is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v4}
      prefer_boolean_prefixes: true  # Boolean variable must have a prefix (is/has/can/should/will/did). This rule only checks class fields and top-level variables, not local variables inside functions/methods. Local variables are implementation details and don't need strict naming conventions. {v7}
      prefer_camel_case_method_names: true  # Method name does not follow lowerCamelCase convention. Non-standard casing breaks IDE autocompletion and makes the API inconsistent with Dart SDK and package conventions. {v2}
      prefer_cascade_over_chained: true  # Consecutive method calls on the same variable repeat the target name unnecessarily. Cascade notation (..) signals that all operations mutate the same object. Only flags batch patterns (same method repeated) or 3+ consecutive calls. {v2}
      prefer_conditional_expressions: true  # Using ternary expressions instead of if-else is a code shape preference. Both compile to equivalent code with no performance impact. Enable via the stylistic tier. {v4}
      prefer_correct_callback_field_name: true  # Using onXxx naming for callback fields is a Dart API convention. Callback naming does not affect code behavior or performance. Enable via the stylistic tier. {v5}
      prefer_correct_handler_name: true  # Using handleXxx or onXxx naming for handler methods is a convention. Handler naming does not affect code behavior or performance. Enable via the stylistic tier. {v3}
      prefer_correct_setter_parameter_name: true  # Using value as the setter parameter name is a Dart convention. The parameter name does not affect setter behavior or performance. Enable via the stylistic tier. {v4}
      prefer_doc_comments_over_regular: true  # Use doc comments (///) instead of regular comments (//) for public API documentation. This is an opinionated rule - not included in any tier by default. {v6}
      prefer_doc_straight_apostrophe: true  # Use straight apostrophe (') instead of Right Single Quotation Mark (') in documentation. This is an opinionated rule - not included in any tier by default. {v4}
      prefer_duration_constants: true  # Using named Duration constants instead of inline constructors is a naming convention. Both create identical Duration objects with no performance difference. Enable via the stylistic tier. {v2}
      prefer_early_return: true  # Deeply nested if blocks increase cognitive load and make code harder to follow. Early returns flatten the structure and clarify preconditions. {v7}
      prefer_exception_suffix: true  # Exception classes missing the "Exception" suffix are harder to identify as throwable types during code review and IDE search. {v2}
      prefer_expect_over_assert_in_tests: true  # An assert() call was found in test code. Assertions are silently skipped in release mode and provide poor failure messages; use expect() with matchers instead for reliable and descriptive test failures. {v3}
      prefer_explicit_type_arguments: true  # Generic type without explicit type arguments. Explicit type arguments improve code clarity and prevent accidental type inference issues. Collections with types inferred from context are skipped. {v6}
      prefer_grouped_imports: true  # Imports are not grouped by type (dart:, package:, relative). Ungrouped imports make it harder to locate dependencies at a glance; organize them into dart:, package:, and relative sections separated by blank lines. {v4}
      prefer_if_null_over_ternary: true  # Null-checking ternary detected where the ?? operator expresses the same intent more concisely. Replace with ?? to reduce verbosity and follow idiomatic Dart conventions. {v4}
      prefer_immediate_return: true  # Returning an expression directly instead of assigning to a variable first is a stylistic preference. Both produce the same compiled output. Enable via the stylistic tier. {v6}
      prefer_implicit_boolean_comparison: true  # Comparing a boolean expression to a boolean literal (== true or == false) is redundant and adds visual noise. Remove the comparison and use the expression directly for cleaner, idiomatic Dart. {v4}
      prefer_inline_callbacks: true  # Callback references a separate method, forcing readers to jump away to understand behavior. This is an opinionated rule - not included in any tier by default. {v3}
      prefer_interpolation_over_concatenation: true  # String concatenation with the + operator was detected where interpolation would be cleaner. Concatenation adds visual noise and is less idiomatic in Dart. Use $-interpolation for improved readability. {v2}
      prefer_kebab_tag_name: true  # Tag name should follow naming conventions. Widget tag names don't follow conventions. This naming violation reduces readability and makes the codebase harder for teams to navigate. {v4}
      prefer_list_first: true  # Using [0] instead of .first is a stylistic choice. The .first getter calls [0] internally — there is no performance benefit. Enable via the stylistic tier. {v4}
      prefer_list_last: true  # Using [length-1] instead of .last is a stylistic choice. The .last getter does the same indexing internally — no performance benefit. Enable via the stylistic tier. {v3}
      prefer_lower_camel_case_constants: true  # Constant name does not follow lowerCamelCase convention. Inconsistent casing breaks IDE autocompletion expectations and diverges from the Dart style guide. {v3}
      prefer_no_commented_out_code: true  # Commented-out code clutters the codebase. Delete it - git preserves history. Prose comments and special markers like TODO, FIXME, and test directives are automatically skipped. {v5}
      prefer_null_aware_assignment: true  # An if-null-then-assign pattern was detected that can be simplified. Replace the verbose null check and assignment block with the ??= operator for a concise, idiomatic single-expression assignment. {v3}
      prefer_nullable_over_late: true  # Field uses late initialization, which risks a LateInitializationError at runtime if read before assignment. Use a nullable type instead so the compiler enforces null checks at every access point. {v4}
      prefer_on_over_catch: true  # A bare "catch" clause catches all exception types indiscriminately, which can mask unexpected errors and hinder targeted recovery. Use "on ExceptionType" to restrict handling to known failures. {v1}
      prefer_pushing_conditional_expressions: true  # Moving conditional logic into return expressions is a code shape preference. No performance or correctness difference between forms. Enable via the stylistic tier. {v4}
      prefer_rethrow_over_throw_e: true  # Using throw e resets the stack trace to the current frame, losing the original call site information. Use rethrow to preserve the full stack trace for easier debugging. {v3}
      prefer_returning_condition: true  # Returning a condition directly instead of if-else with true/false is a simplification preference. No performance or correctness difference. Enable via the stylistic tier. {v4}
      prefer_returning_conditional_expressions: true  # Returning a ternary expression instead of if-else is a stylistic preference. Both compile to the same code with no performance difference. Enable via the stylistic tier. {v2}
      prefer_returning_conditionals: true  # Simplifying return logic to a single conditional expression is a code shape preference. Both forms produce equivalent compiled output. Enable via the stylistic tier. {v4}
      prefer_returning_shorthands: true  # Simplifying return expressions to shorter forms is a code style preference. Both produce equivalent compiled output with no performance impact. Enable via the stylistic tier. {v5}
      prefer_single_blank_line_max: true  # Multiple consecutive blank lines waste vertical space and create visual gaps that break reading flow. One blank line is sufficient to separate logical sections. {v3}
      prefer_single_quotes: true  # Double quotes detected where single quotes would suffice. Prefer single quotes for consistency with Dart style conventions and to reduce visual noise in string literals. {v7}
      prefer_snake_case_files: true  # File name does not follow snake_case convention. Non-standard file names break import autocompletion and make the project structure harder to navigate on case-sensitive file systems. {v4}
      prefer_specific_exceptions: true  # A generic Exception is thrown instead of a domain-specific type. Generic exceptions prevent callers from catching specific failures and limit targeted error recovery; define and throw a custom exception class. {v2}
      prefer_spread_over_addall: true  # Collection uses addAll() instead of the spread operator. The spread syntax [...list1, ...list2] is a declarative, expression-level merge that avoids mutation. {v3}
      prefer_trailing_comma: true  # Adding trailing commas in multi-line constructs is a formatting preference that affects diff readability. No performance or correctness impact. Enable via the stylistic tier. {v4}
      prefer_trailing_comma_always: true  # A multi-line argument list or collection is missing a trailing comma. Add one so dart format keeps each element on its own line, producing cleaner diffs and easier reordering. {v4}
      prefer_trailing_underscore_for_unused: true  # Naming unused variables with a trailing underscore is a convention. The Dart compiler handles unused variables the same either way. Enable via the stylistic tier. {v4}
      prefer_type_over_var: true  # Preferring explicit type annotations over var is a style choice. Both produce identical compiled code. Conflicts with prefer_var_over_explicit_type. Enable via the stylistic tier. {v4}
      prefer_wildcard_for_unused_param: true  # Unused positional parameter obscures intent and signals incomplete API design. Replacing it with a _ wildcard (Dart 3.7+) makes the function signature self-documenting, communicating that the parameter exists for interface conformance but is intentionally ignored in this implementation. Named parameters are excluded because Dart forbids _-prefixed named params. {v5}


