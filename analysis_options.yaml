# cspell: ignore ktlint tearoffs interps setstate WCAG listview inlines datetimes initstate maybeof mediaquery singlechildscrollview scrollview expando futureor vsync firestore scrollables sizedbox
#
# saropa_lints ^1.5.1 - 628+ lint rules for Flutter and Dart
# https://pub.dev/packages/saropa_lints/changelog
#
# Configuration optimized for: DART UTILITY LIBRARY (not a Flutter app)

# cspell:disable

analyzer:
  exclude:
    - "**/*.bak"
    - "**/*.freezed.dart"
    - "**/*.g.dart"
    - "**/*.old"
    - ".crashlytics/**"
    - ".dart_tool/**"
    - ".dev/**"
    - ".github/**"
    - ".idea/**"
    - ".vs/**"
    - ".vscode/**"
    - "android/**"
    - "assets/**"
    - "bin/cache/**"
    - "build/**"
    - "dependency_overrides/**"
    - "example/**"
    - "ios/**"
    - "ktlint"
    - "lib/generated_plugin_registrant.dart"
    - "scripts/**"
    - "test/.test_coverage.dart"
    - "tool/**"

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    cast_nullable_to_non_nullable: warning
    missing_required_param: error
    missing_return: error
    record_literal_one_positional_no_trailing_comma: error
    collection_methods_unrelated_type: warning
    unrelated_type_equality_checks: warning
    parameter_assignments: warning
    todo: ignore

  strong-mode:
    implicit-dynamic: false
    implicit-casts: false

formatter:
  page_width: 100
  trailing_commas: preserve

# =============================================================================
# SAROPA LINTS - UTILITY LIBRARY CONFIG
# =============================================================================
# Using 'insanity' tier (ALL 500+ rules enabled).
# Disabling rules that don't apply to this Dart utility library (no Flutter).
# =============================================================================

linter:
  rules:
    # Enabled explicitly because pub.dev's pana scores this via the analysis
    # server (which loads the saropa_lints plugin), but `dart analyze` CLI does
    # not load plugins — so without this line the lint stays invisible locally
    # and silently docks the "Pass static analysis" score on publish (40/50).
    curly_braces_in_flow_control_structures: true
    dangling_library_doc_comments: true
    avoid_classes_with_only_static_members: false
    avoid_positional_boolean_parameters: false
    flutter_style_todos: false
    lines_longer_than_80_chars: false
    public_member_api_docs: false
    sort_pub_dependencies: false

plugins:
  saropa_lints:
    version: "13.12.3"
    # ═══════════════════════════════════════════════════════════════════
    # SAROPA LINTS CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════
    # Regenerate with: dart run saropa_lints:init --tier recommended
    # Tier: recommended (788 of 2165 rules enabled)
    # Lint rules are disabled by default. Set to true to enable.
    # User customizations are preserved unless --reset is used
    #
    # Tiers (cumulative):
    #   1. essential    - Critical: crashes, security, memory leaks
    #   2. recommended  - Essential + accessibility, performance
    #   3. professional - Recommended + architecture, testing
    #   4. comprehensive - Professional + thorough coverage
    #   5. pedantic     - All rules (pedantic, highly opinionated)
    #   +  stylistic    - Opt-in only (formatting, ordering)
    #
    # Disabled platforms: ios, android, macos, web, windows, linux
    #
    # Disabled packages: bloc, provider, riverpod, getx, flutter_hooks, equatable, freezed, firebase, isar, hive, shared_preferences, sqflite, drift, dio, graphql, supabase, get_it, workmanager, url_launcher, geolocator, qr_scanner, flame
    #
    # Settings (max_issues, platforms, packages) are in analysis_options_custom.yaml
    # ═══════════════════════════════════════════════════════════════════

    diagnostics:
      #
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #   ◆ USER CUSTOMIZATIONS
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      #
      # These rules have been manually configured and will be preserved
      # when regenerating. Use --reset to discard these customizations.

      avoid_barrel_files: false  # [INFO] File contains only export statements (barrel file). Barrel files increase build times by pulling in unused code and obscure dependency tracking, making it harder to identify which modules depend on which implementations. {v6}
      avoid_non_ascii_symbols: false  # [INFO] String contains non-ASCII characters. Non-ASCII characters can cause encoding issues and may be hard to distinguish visually (e.g., different types of spaces). {v4}
      avoid_static_state: false  # [WARNING] Static mutable state persists across hot-reloads and tests, causing stale data and inconsistent behavior. Tests fail unpredictably due to shared state leaking between runs, and production bugs become hard to reproduce across different app sessions and isolates. {v4}
      avoid_unmarked_public_class: false  # [INFO] Public class lacks an explicit class modifier. Dart 3.0 introduced class modifiers (base, final, interface, sealed). For API stability, public classes should declare their inheritance intent. {v3}
      function_always_returns_null: false  # [WARNING] Function returns null on every code path, making the return type effectively void. Callers that check or use the return value are performing dead logic, and the nullable return type misleads developers into thinking the function can return meaningful data. {v6}
      move_variable_closer_to_its_usage: false  # [INFO] Variable declared far from its first use, with several unrelated statements in between. This forces readers to hold the variable in memory while reading irrelevant code, reducing comprehension and increasing the risk of accidental reuse or shadowing. {v8}
      no_empty_string: false  # [INFO] Using empty string literals ("") in your code can be ambiguous and may indicate a missing value or a placeholder. Relying on empty strings for logic can lead to subtle bugs and makes intent unclear to readers. {v6}
      no_magic_number_in_tests: false  # [INFO] Unexplained numeric literal in test file obscures the purpose of expected values and assertions. When a test fails, readers cannot tell whether the number is an arbitrary fixture value, a meaningful boundary, or a calculated expected result, making failures harder to diagnose and fix. {v4}
      no_magic_string_in_tests: false  # [INFO] Unexplained string literal in test file obscures the purpose of expected values and assertions. When a test fails, readers cannot tell whether the string is an arbitrary fixture, a meaningful expected output, or a format-specific value, making failures harder to diagnose. {v5}
      prefer_compute_for_heavy_work: false  # [INFO] Heavy computation such as encryption, compression, or parsing runs synchronously on the main UI thread. This blocks the rendering pipeline, freezing animations, dropping frames, and making the app unresponsive to touch input for the duration of the operation. On lower-end devices, this delay is especially pronounced and triggers ANR warnings on Android. {v5}
      prefer_descriptive_test_name: false  # [INFO] Test name must be descriptive. Test names must be descriptive and follow conventions. Test names don't follow the expected format. This reduces test maintainability and makes it harder to identify which behavior failed when tests break. {v7}
      prefer_prefixed_global_constants: false  # [INFO] Global constant must have a descriptive prefix. Global constants must be prefixed with 'k' or similar. {v5}
      prefer_secure_random: false  # [WARNING] Random() uses a predictable pseudo-random number generator that produces reproducible sequences from a known seed. Tokens, passwords, encryption keys, or nonces generated with Random() can be predicted by attackers, enabling session hijacking, credential guessing, and cryptographic attacks. {v3}
      prefer_static_method: false  # [INFO] Method does not reference any instance members and could be static. Non-static methods that ignore instance state mislead readers into thinking the method depends on object state, and they prevent calling the method without an instance. {v4}
      require_https_only_test: false  # [INFO] HTTP URL detected in test file. Consider using HTTPS even in test data. {v3}
      require_ios_deployment_target_consistency: false  # [WARNING] API requiring iOS 15+ detected. Ensure minimum deployment target matches or add version guards. {v2}
      require_test_description_convention: false  # [INFO] Test description should explain what is being tested and expected behavior. Test descriptions should explain WHAT is being tested and WHAT the expected behavior is. This helps with test maintenance and debugging. {v3}

      #
      # ════════════════════════════════════════════════════════════════════════
      #   ✓ ENABLED RULES (RECOMMENDED TIER)
      # ════════════════════════════════════════════════════════════════════════
      #

      #
      # --- TIER 1: ESSENTIAL (228 rules) ---
      #
      abi_specific_integer_invalid: true  # [WARNING] A class extending AbiSpecificInteger must be final, have no type parameters, declare exactly one const constructor, no other members, and an AbiSpecificIntegerMapping annotation. {v1}
      abstract_field_initializer: true  # [WARNING] Abstract fields cannot have initializers. Remove the initializer or drop the abstract modifier so the declaration matches valid Dart semantics. {v1}
      always_remove_listener: true  # [WARNING] Listener added via addListener() but no matching removeListener() call found in dispose(). Orphaned listeners retain references to the widget, preventing garbage collection and causing memory leaks that accumulate as users navigate between screens. {v3}
      annotate_inherited_member_redeclaration: true  # [INFO] This member hides an inherited instance member with the same name. Add @override if it is an override, or document why the name is reused intentionally. {v1}
      avoid_api_key_in_code: true  # [ERROR] Hardcoded keys are extractable from app binaries, enabling unauthorized API access and billing abuse. {v3}
      avoid_app_links_sensitive_params: true  # [ERROR] Deep link params are logged by OS and analytics, exposing tokens in crash reports and logs. {v2}
      avoid_assert_in_production: false  # Disabled: this library uses assert() for 42 dev-time precondition checks (equal-length series, window >= 2, non-empty inputs) across 23 algorithm files — the documented Dart idiom for caller-contract validation that is intentionally stripped in release. A newer saropa_lints promoted this to WARNING, failing `dart pub publish --dry-run` (exit 65). Original {v2}: assert() is compiled out of release builds.
      avoid_asset_manifest_json: true  # [ERROR] The 'AssetManifest.json' file was removed in Flutter 3.38.0 (PR #172594). Code that loads this path at runtime — such as rootBundle.loadString('AssetManifest.json') — will throw a FlutterError because the file no longer exists in the built app bundle. Migrate to the typed AssetManifest API (AssetManifest.loadFromAssetBundle) or use 'AssetManifest.bin' for the binary format. {v1}
      avoid_async_callback_in_fake_async: true  # [ERROR] Async callback uses real time, making tests hang or timeout instead of using controlled fake time. {v2}
      avoid_async_in_build: true  # [ERROR] Build method should never be async. This will cause rendering issues. {v2}
      avoid_audio_in_background_without_config: true  # [ERROR] Audio playback stack detected but platform config is missing background audio entries (iOS UIBackgroundModes audio and/or Android FOREGROUND_SERVICE). Playback can stop or fail review. {v1}
      avoid_auth_in_query_params: true  # [ERROR] Query params are logged in server logs, browser history, and referrer headers, leaking auth tokens. {v3}
      avoid_blocking_main_thread: true  # [WARNING] Synchronous I/O blocks the main isolate, freezing the UI and causing jank or ANR (Application Not Responding) errors on mobile platforms. Even brief blocking degrades perceived performance and user experience significantly. {v1}
      avoid_builder_index_out_of_bounds: true  # [WARNING] itemBuilder accesses list without bounds check. If the index is out of bounds due to list changes, this will cause runtime exceptions, app crashes, and unpredictable UI behavior. This is a common source of production bugs in dynamic lists and can lead to negative user reviews. {v7}
      avoid_cached_image_unbounded_list: true  # [WARNING] CachedNetworkImage used inside a scrollable list without memCacheWidth or memCacheHeight. All images are cached at full resolution, causing excessive memory usage that can lead to OOM crashes on lower-end devices. In a long list, this quickly exhausts available memory. {v1}
      avoid_catch_all: true  # [WARNING] Bare catch clause without an on-type hides the specific error type being caught and silently swallows critical failures like OutOfMemoryError and StackOverflowError. This can mask fatal programming bugs, making them impossible to detect in crash reports or monitoring systems. {v3}
      avoid_catch_exception_alone: true  # [WARNING] Using "on Exception catch" without an "on Object catch" fallback silently misses all Error types including StateError, TypeError, and RangeError. These programming errors will crash the app without being logged or reported, making production debugging extremely difficult. {v2}
      avoid_circular_dependencies: true  # [WARNING] Service class constructor depends on another service of the same architectural layer (both end with Service, Repository, Controller, etc.). This creates circular dependency chains that break initialization order, prevent unit testing with mocks, and produce tightly coupled modules that cannot be modified or deployed independently. {v5}
      avoid_circular_redirects: true  # [ERROR] GoRoute redirect callback always returns a path and never returns null, creating an unconditional redirect that forms an infinite loop. The router exhausts the redirect limit and throws an exception, crashing the app or permanently locking users out of all navigation when the redirect chain has no termination condition. {v2}
      avoid_clearing_form_on_error: true  # [WARNING] Form fields are cleared when validation fails, destroying all user input. Users lose their partially-correct data and must re-enter everything from scratch. This frustrating pattern increases form abandonment, wastes user time, and creates a hostile experience that drives users away from completing the form submission. {v2}
      avoid_clipboard_sensitive: true  # [WARNING] Clipboard contents persist and are readable by other apps, exposing passwords and tokens. {v4}
      avoid_color_only_meaning: true  # [WARNING] Color is used as the sole visual indicator to convey meaning or state, which is inaccessible to approximately 8% of men and 0.5% of women with color vision deficiency. WCAG 1.4.1 (Use of Color) requires that color is never the only visual means of conveying information, indicating an action, or distinguishing a visual element. Always pair color with a secondary cue such as an icon, text label, underline, or pattern. {v1}
      avoid_connectivity_equals_internet: true  # [WARNING] ConnectivityResult compared as a proxy for internet availability. ConnectivityResult only indicates the transport layer (WiFi, mobile, ethernet) and does not verify actual internet reachability. A device can report WiFi while behind a captive portal, or mobile data with no route to the internet. Use an actual HTTP ping or DNS lookup to verify connectivity. {v1}
      avoid_context_across_async: true  # [ERROR] BuildContext used after await crashes if widget was disposed during the async gap. Check mounted first. {v7}
      avoid_context_after_await_in_static: true  # [ERROR] BuildContext used after await in static method. Context may be invalid after async gap. {v5}
      avoid_context_after_navigation: true  # [WARNING] BuildContext accessed after an awaited navigation call without a mounted check. The widget that owns this context is likely disposed by the time the await completes, and calling ScaffoldMessenger.of(), Navigator.of(), or Theme.of() on a disposed context throws a FlutterError that crashes the app or produces silent failures in release mode. {v3}
      avoid_context_dependency_in_callback: true  # [WARNING] BuildContext-dependent call (Theme.of, MediaQuery.of, Navigator.of, ScaffoldMessenger.of, etc.) is used inside an asynchronous callback such as Future.then(), Future.delayed(), or Timer. After an async gap the originating widget may have been unmounted, making the captured BuildContext stale and causing a "Looking up a deactivated widget's ancestor" exception at runtime. {v2}
      avoid_datetime_now_in_tests: true  # [WARNING] DateTime.now() in tests produces non-deterministic values that vary between runs, causing flaky assertions that pass locally but fail in CI, making test failures impossible to reproduce reliably. {v2}
      avoid_deep_link_sensitive_params: true  # [ERROR] Deep link query parameter contains sensitive data (password, token, secret, API key, or credential), creating a security breach. Deep link URLs are recorded in system logs, browser history, HTTP referrer headers, and analytics platforms, permanently exposing credentials to attackers who gain access to those logs or the device history. {v4}
      avoid_deprecated_crypto_algorithms: true  # [WARNING] The use of outdated cryptographic algorithms such as MD5, SHA1, DES, 3DES, and RC4 exposes your application to well-known attacks. These algorithms have been broken by the security community: MD5 and SHA1 are vulnerable to collision and preimage attacks, allowing attackers to forge digital signatures or tamper with data. DES and 3DES have insufficient key lengths and are susceptible to brute-force attacks, while RC4 is vulnerable to several biases and key recovery attacks. Continuing to use these algorithms puts all encrypted or hashed data at risk of compromise, regardless of other security measures. {v2}
      avoid_dialog_context_after_async: true  # [ERROR] If you call Navigator.pop() or use BuildContext after an await, the widget may have been disposed, causing a "Looking up deactivated widget" crash. This leads to app instability and poor user experience. {v5}
      avoid_dialog_in_build: true  # [ERROR] Calling showDialog (or similar) inside build() will cause your app to enter an infinite loop, repeatedly showing dialogs and freezing the UI. This results in a poor user experience and may crash the app. {v2}
      avoid_double_for_money: true  # [ERROR] Floating point causes rounding errors in money calculations. $0.1 + $0.2 != $0.3, causing financial loss. {v4}
      avoid_duplicate_map_keys: true  # [WARNING] Duplicate key in map literal silently overwrites the earlier value, causing data loss and unpredictable behavior. Only the last value assigned to the key will persist in the resulting map. {v4}
      avoid_duplicate_widget_keys: true  # [WARNING] Multiple widgets in a list share the same Key value. Flutter uses keys to match old widgets with new widgets during reconciliation. Duplicate keys cause the framework to reuse the wrong element, leading to stale state, broken animations, and incorrect widget ordering after list mutations. {v4}
      avoid_dynamic_code_loading: true  # [ERROR] Dynamic code loading at runtime bypasses compile-time dependency verification, allowing execution of unverified code and creating supply chain attack vectors. {v3}
      avoid_dynamic_sql: true  # [ERROR] Constructing SQL queries by concatenating or interpolating user input directly into the query string exposes your application to SQL injection attacks. Attackers can craft input that alters the structure of your query, allowing them to read, modify, or delete arbitrary data, escalate privileges, or compromise the entire database. SQL injection is one of the most critical and well-documented security vulnerabilities in software development, and has led to major data breaches across industries. {v4}
      avoid_eval_like_patterns: true  # [ERROR] Dynamic code execution allows arbitrary code injection, enabling attackers to execute malicious code. {v7}
      avoid_excessive_rebuilds_animation: true  # [WARNING] The builder callback of this animation widget contains too many widget constructors, causing the entire subtree to rebuild on every animation frame (typically 60 times per second). This wastes CPU cycles, increases battery drain, and degrades animation smoothness. Only widgets that actually change during the animation should be inside the builder; static content should be passed via the child parameter or moved outside. {v2}
      avoid_expanded_outside_flex: true  # [ERROR] Expanded, Flexible, and Spacer set FlexParentData on their child, which only RenderFlex (Row, Column, Flex) can read during layout. Placing them inside any other parent — Stack, Center, Padding, LimitedBox, SizedBox, etc. — throws an unrecoverable "Incorrect use of ParentDataWidget" FlutterError at runtime. This also happens indirectly when a widget's build() returns Expanded and the widget is later wrapped by a non-Flex container, breaking the Flex→Expanded parent chain. {v7}
      avoid_external_storage_sensitive: true  # [ERROR] External storage is world-readable on Android, exposing credentials to any installed app. {v4}
      avoid_fixed_size_in_scaffold_body: true  # [WARNING] Scaffold body has a Column with text input fields but no ScrollView. The keyboard will cause overflow. {v2}
      avoid_flashing_content: true  # [WARNING] Flashing >3Hz can trigger seizures in users with photosensitive epilepsy. WCAG 2.3.1 compliance required. {v4}
      avoid_future_in_build: true  # [WARNING] Creating Future in build() causes repeated async calls on every rebuild. {v2}
      avoid_geolocator_background_without_config: true  # [ERROR] Geolocator.getPositionStream is used but platform config is missing background location entries (iOS UIBackgroundModes location and/or Android ACCESS_BACKGROUND_LOCATION). Updates may stop when the app is backgrounded. {v1}
      avoid_getx_build_context_bypass: true  # [ERROR] Get.context or Get.overlayContext bypasses Flutter's BuildContext propagation. This hides widget tree dependencies, makes code untestable without GetX runtime, and circumvents Flutter's fundamental context-based service location pattern. The retrieved context may be stale or from an unexpected part of the widget tree, causing subtle bugs. {v2}
      avoid_global_key_in_build: true  # [ERROR] Creating a GlobalKey inside the build() method causes it to be recreated on every rebuild, which results in lost widget state, broken references, and unpredictable UI behavior. This can cause your app to lose user input or fail to maintain state across rebuilds. {v4}
      avoid_go_router_inline_creation: true  # [WARNING] GoRouter instance created inside build() is destroyed and recreated on every widget rebuild. This resets all navigation state including the current route stack, destroys in-flight transitions, breaks hot reload during development, and causes users to lose their navigation position whenever the parent widget rebuilds. {v3}
      avoid_hardcoded_config: true  # [WARNING] Hardcoded configuration value detected. Embedding URLs, ports, API keys, or feature flags directly in source code makes the app inflexible across environments (dev, staging, production) and forces a rebuild for every configuration change, increasing deployment risk. {v5}
      avoid_hardcoded_credentials: true  # [ERROR] Hardcoding credentials (such as passwords, API keys, or tokens) in source code exposes them to anyone with access to the codebase, including public repositories and version control history. This can lead to unauthorized access, data breaches, and compromised systems. Credentials should always be stored securely and never committed to version control. {v5}
      avoid_hardcoded_encryption_keys: true  # [ERROR] Hardcoded encryption keys present in source code or binaries can be easily extracted by attackers using reverse engineering tools. Once exposed, these keys allow adversaries to decrypt all user data protected by the key, resulting in a complete compromise of confidentiality for every user of your application. This vulnerability is especially critical in mobile and web apps, where binaries are distributed to end users. Hardcoded keys are often found in test code, examples, or as quick fixes, but they must never be used in production or shipped code. Attackers routinely scan for such patterns, and automated tools can detect and extract these secrets within minutes of release. {v5}
      avoid_hidden_interactive: true  # [ERROR] This interactive element uses excludeFromSemantics, making it completely inaccessible to screen readers and users with assistive technologies. Excluding interactive child elements from the semantics tree prevents users with disabilities from discovering or activating key actions, which fails accessibility standards and can break critical workflows. {v3}
      avoid_hive_synchronous_in_ui: true  # [WARNING] Synchronous Hive box operation (get, put, delete, add) is called inside a build() or initState() method. These operations perform disk I/O on the main isolate, blocking frame rendering and causing visible UI jank. On slower devices or with large boxes, this can trigger ANR (Application Not Responding) dialogs, force-close the app, and create a poor user experience that leads to negative app store reviews. {v2}
      avoid_ignoring_ssl_errors: true  # [ERROR] Bypassing or ignoring SSL/TLS certificate errors disables the core security guarantees of HTTPS, allowing man-in-the-middle attackers to intercept, modify, or steal all data sent over the network. This exposes user credentials, tokens, and sensitive personal data to silent compromise, and is a leading cause of real-world security breaches. SSL validation must never be disabled in production code. {v3}
      avoid_inherited_widget_in_initstate: true  # [WARNING] InheritedWidget accessed in initState(), where the widget is not yet fully mounted in the element tree. This call returns stale or missing data and does not subscribe to updates, so the widget never rebuilds when the inherited value changes. {v4}
      avoid_keyboard_overlap: true  # [INFO] TextField may be hidden behind the soft keyboard when no viewInsets handling is detected. Users cannot see what they are typing, leading to input errors, frustration, and accessibility failures on devices where the keyboard covers a large portion of the screen. {v5}
      avoid_late_final_reassignment: true  # [WARNING] Late final field has multiple assignment paths, which throws a LateInitializationError at runtime on the second write. The compiler cannot catch this statically, so the crash only surfaces during execution of the specific code path that triggers the duplicate assignment. {v4}
      avoid_loading_full_pdf_in_memory: true  # [WARNING] Loading an entire PDF file into memory can cause out-of-memory errors, especially on mobile devices with limited RAM. This can crash the app, degrade performance, and prevent users from viewing large documents. {v3}
      avoid_logging_sensitive_data: true  # [ERROR] Logging sensitive data such as passwords, tokens, or personally identifiable information (PII) exposes users to privacy risks and can result in data leaks if logs are accessed by unauthorized parties. Sensitive information in logs may appear in crash reports, debug output, or be inadvertently shared with third parties, leading to compliance violations and loss of user trust. Always sanitize logs to prevent exposure of confidential data. {v6}
      avoid_losing_stack_trace: true  # [WARNING] Rethrowing without preserving the stack trace loses the original error location and call chain. Production debugging becomes impossible because crash reports show only the rethrow site, not where the error actually originated. Always capture and forward the full stack trace. {v2}
      avoid_misused_hooks: true  # [WARNING] Hook function is called inside a callback or closure, which violates the rules of hooks. Hooks must be called at the top level of the build method, never inside callbacks (onPressed, onTap), event handlers, or nested functions. Hooks called inside closures execute unpredictably because the closure may run zero, one, or many times per build, breaking hook state tracking and causing runtime errors or lost state. {v1}
      avoid_mixed_environments: true  # [ERROR] Mixing production and development configuration in your codebase creates serious security vulnerabilities. Debug APIs may expose sensitive data, development endpoints can corrupt production databases, and credentials may leak to unauthorized users. This can result in data breaches, compliance violations, and loss of user trust. Environment-specific configuration must be strictly separated and managed. {v4}
      avoid_mounted_in_setstate: true  # [WARNING] Checking the mounted property inside a setState callback is an anti-pattern. If the widget is not mounted, setState should not be called at all. Placing the check inside the callback can lead to subtle bugs where partial state updates execute before the mounted check runs. {v5}
      avoid_multiple_material_apps: true  # [ERROR] Multiple MaterialApp (or CupertinoApp) widgets in the tree create separate Navigator stacks, separate Theme contexts, and independent Locale/MediaQuery scopes. This breaks navigation (pushNamed cannot reach routes in the other app), causes theme inconsistencies, and doubles memory usage for shared resources. {v2}
      avoid_nested_scaffolds: true  # [WARNING] Nested Scaffold widget detected inside another Scaffold. This creates duplicate app bars, floating action buttons, and bottom navigation, leading to broken layout, gesture conflicts, and a confusing user experience. {v5}
      avoid_notification_same_id: true  # [WARNING] Static or hardcoded notification ID causes newer notifications to silently replace older ones using the same identifier. Users will miss important alerts, messages, and time-sensitive updates without any indication that previous notifications were overwritten, leading to lost information and degraded communication reliability. {v3}
      avoid_notification_silent_failure: true  # [WARNING] Notification operation without error handling. Failures will be silent and hard to debug. {v2}
      avoid_null_assertion: true  # [INFO] Null assertion operator (!) throws a runtime exception if the value is null, crashing the app without a meaningful error message. The resulting _CastError provides no context about which value was null or why, making production crashes difficult to diagnose from error reports alone. {v8}
      avoid_openai_key_in_code: true  # [ERROR] Hardcoded OpenAI keys are extractable from binaries, enabling API abuse charged to your account. {v2}
      avoid_optional_field_crash: true  # [ERROR] JSON field accessed with direct bracket notation on a Map that may contain null values. When the API response omits an optional field, this direct access throws a runtime exception that crashes the app. Defensive null-aware access with ?[] prevents unexpected null pointer errors and provides graceful handling of incomplete or malformed JSON responses. {v2}
      avoid_overlapping_animations: true  # [WARNING] Multiple animations targeting the same property (e.g., opacity, position, scale) at the same time cause visual jitter, unpredictable results, and confusing UI behavior. Overlapping animations can make transitions hard to follow and degrade user experience, especially for users with cognitive or visual disabilities. {v4}
      avoid_parameter_mutation: true  # [WARNING] Parameter object is being mutated. This modifies the caller's data. {v2}
      avoid_path_traversal: true  # [WARNING] File paths constructed from user input may allow path traversal attacks (e.g., "../"), enabling access to sensitive files outside the intended directory. Validate and canonicalize paths before file access, and reject any input containing parent-directory segments. {v8}
      avoid_permission_handler_null_safety: true  # [ERROR] Deprecated pre-null-safety permission_handler API detected. The PermissionHandler() constructor and PermissionGroup enum were removed in permission_handler 8.0+. Using these deprecated APIs prevents migration to null-safe versions and causes compile errors when updating the package. The modern API uses Permission.camera.status and Permission.camera.request() instead. {v2}
      avoid_positioned_outside_stack: true  # [ERROR] Positioned widget used outside of a Stack. This causes a ParentData crash at runtime. {v5}
      avoid_print_error: true  # [WARNING] Using print() for error logging in a catch block. In production, print() output is not captured by crash reporting services like Crashlytics or Sentry, making errors invisible to monitoring dashboards. Errors logged only via print() are effectively lost and cannot trigger alerts or be tracked over time. {v2}
      avoid_print_in_release: true  # [ERROR] Using print() in production exposes debug information to end users, can leak sensitive data, and negatively impacts performance. Print statements are not optimized for release builds and may clutter logs, making it harder to diagnose real issues. This can also violate privacy policies and app store guidelines. {v3}
      avoid_purchase_in_sandbox_production: true  # [ERROR] Hardcoded IAP environment URL detected. Sandbox receipts fail in production and vice versa. {v3}
