# ─────────────────────────────────────────────────────────────────────────────
# ANALYSIS SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
#
# max_issues: Maximum non-ERROR issues shown in the Problems tab.
#   After this limit, rules keep running but remaining issues go to the
#   report log only (reports/<timestamp>_saropa_lint_report.log).
#   - Default: 500
#   - Set to 0 for unlimited (all issues in Problems tab)
#   - Override per-run: SAROPA_LINTS_MAX=200 dart run custom_lint
#
# output: Where violations are sent.
#   - "both"  (default) — Problems tab + report file
#   - "file"  — Report file only (nothing in Problems tab)
#   - Override per-run: SAROPA_LINTS_OUTPUT=file dart run custom_lint

max_issues: 500
output: both

# ─────────────────────────────────────────────────────────────────────────────
# PLATFORM SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
# Disable platforms your project doesn't target.
# Rules specific to disabled platforms will be automatically disabled.
# Only ios and android are enabled by default.
#
# EXAMPLES:
#   - Web-only project: set ios, android, macos, windows, linux to false; web to true
#   - All platforms: set all to true
#   - Desktop app: set macos, windows, linux to true

platforms:
  ios: true
  android: true
  macos: false
  web: false
  windows: false
  linux: false

# cspell:disable

# ─────────────────────────────────────────────────────────────────────────────
# PACKAGE SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
# Disable packages your project doesn't use.
# Rules specific to disabled packages will be automatically disabled.
# All packages are enabled by default for backward compatibility.
#
# EXAMPLES:
#   - Riverpod-only project: set bloc, provider, getx to false
#   - No local DB: set isar, hive, sqflite to false
#   - No Firebase: set firebase to false

packages:
  bloc: true
  provider: true
  riverpod: true
  getx: true
  flutter_hooks: true
  equatable: true
  freezed: true
  firebase: true
  isar: true
  hive: true
  shared_preferences: true
  sqflite: true
  dio: true
  graphql: true
  supabase: true
  get_it: true
  workmanager: true
  url_launcher: true
  geolocator: true
  qr_scanner: true
  flame: true

# ─────────────────────────────────────────────────────────────────────────────
# STYLISTIC RULES
# ─────────────────────────────────────────────────────────────────────────────
# Opinionated formatting, ordering, and naming convention rules.
# These are NOT included in any tier - enable the ones that match your style.
# Set to true to enable, false to disable.
#
# NOTE: Some rules conflict (e.g., prefer_single_quotes vs
# prefer_double_quotes). Only enable one from each conflicting group.
#
# [reviewed] markers track walkthrough progress. Do NOT remove them.
# Use --reset-stylistic to clear markers and re-review all rules.

# --- Debug/Test utility ---
prefer_fail_test_case: false  # [reviewed] This custom lint always fails (test hook). Formerly: always_fail_test_case. Test-only rule that always reports a lint at the start of the file. {v3} This rule always fails by design — it verifies your lint pipeline is active. Seeing this error confirms saropa_lints is running. Remove prefer_fail_test_case from your enabled rules once verified.

# --- Ordering & Sorting ---
prefer_member_ordering: false  # [reviewed] Class members are not in conventional order. Members must be ordered: fields, constructors, methods. {v4} Reorder class members to follow the conventional layout: static fields, instance fields, constructors, then methods.
prefer_arguments_ordering: false  # [reviewed] Named arguments are not in alphabetical order. Unsorted arguments force reviewers to scan the entire call site to spot missing or duplicated parameters. {v3} Reorder named arguments alphabetically so reviewers can quickly spot missing or duplicate arguments.
prefer_sorted_parameters: false  # [reviewed] Named parameters are not in alphabetical order. Unsorted parameters force developers to scan all parameters to find the one they need, and inconsistent ordering across functions creates unnecessary cognitive load during code review. {v6} Reorder named parameters alphabetically so developers can quickly locate parameters by name without scanning the entire parameter list.
prefer_sorted_pattern_fields: false  # [reviewed] Unsorted pattern fields slow code review and make refactoring error-prone. Alphabetical ordering provides a predictable scanning path, reduces merge conflicts when multiple developers modify the same pattern, and makes it easier to spot missing or duplicate fields at a glance. {v5} Reorder the pattern fields in alphabetical order. The quick fix can sort them automatically while preserving comments.
prefer_sorted_record_fields: false  # [reviewed] Unsorted record fields slow code review and make refactoring error-prone. Alphabetical ordering provides a predictable scanning path, reduces merge conflicts when multiple developers modify the same record definition, and makes it easier to spot duplicate or missing fields. {v6} Reorder the record fields in alphabetical order. The quick fix can sort them automatically while preserving type annotations.
binary_expression_operand_order: true  # [reviewed] Preferring a specific operand order in binary expressions is a stylistic convention. Both orderings produce equivalent compiled code. Enable via the stylistic tier. {v3} Place the variable or expression on the left side and the constant on the right (e.g., "status == 200" instead of "200 == status") to match natural language order and improve readability.
enforce_parameters_ordering: false  # [reviewed] Ordering parameters in a specific sequence is a convention preference. Parameter order does not affect performance or compiled output. Enable via the stylistic tier. {v3} Order: required positional, optional positional, named. Verify the change works correctly with existing tests and add coverage for the new behavior.
enum_constants_ordering: false  # [reviewed] Ordering enum constants alphabetically is a stylistic preference. Enum constant order does not affect runtime behavior or performance. Enable via the stylistic tier. {v2} Prefer ordering enum constants alphabetically. Verify the change works correctly with existing tests and add coverage for the new behavior.
map_keys_ordering: false  # [reviewed] Ordering map keys alphabetically is a stylistic preference for readability. Key order does not affect map behavior or performance at runtime. Enable via the stylistic tier. {v4} Reorder the map entries alphabetically by key to improve readability and make diffs easier to review.

# --- Naming conventions ---
prefer_boolean_prefixes: true  # [reviewed] Boolean variable must have a prefix (is/has/can/should/will/did). This rule only checks class fields and top-level variables, not local variables inside functions/methods. Local variables are implementation details and don't need strict naming conventions. {v7} Rename this boolean class field or top-level variable to use a standard prefix (is, has, can, should, will, did) or suffix (Enabled, Active, Visible). Does not check locals or parameters. Example: enabled becomes isEnabled.
prefer_no_getter_prefix: false  # [reviewed] Getter with 'get' prefix is redundant. Dart convention omits it. Formerly: avoid_getter_prefix. A getter name starts with 'get'. {v2} Remove the 'get' prefix from the getter name. For example, rename getName to name, or getValue to value.
prefer_kebab_tag_name: true  # [reviewed] Tag name should follow naming conventions. Widget tag names don't follow conventions. This naming violation reduces readability and makes the codebase harder for teams to navigate. {v4} Use kebab-case (lowercase with hyphens) for tag names. Tag names must start with a lowercase letter and contain only lowercase letters, digits, and hyphens.
prefer_capitalized_comment_start: false  # [reviewed] Comment should start with capital letter. Prose comments should start with a capital letter for readability. Commented-out code and continuation comments are automatically detected and skipped. {v4} Capitalize the first letter of the comment text. Prose comments that start with lowercase letters reduce readability.
prefer_descriptive_bool_names: true  # [reviewed] Boolean should use a descriptive prefix (is, has, can, should, etc.) or action verb. This rule is suitable for the professional tier. {v5} Rename this boolean variable, parameter, or field with a descriptive prefix (isEnabled, hasData, canEdit, shouldUpdate) or action verb (processData, sortItems). Checks all booleans, not just fields.
prefer_snake_case_files: true  # [reviewed] File name does not follow snake_case convention. Non-standard file names break import autocompletion and make the project structure harder to navigate on case-sensitive file systems. {v4} Rename the file to snake_case (e.g., user_service.dart instead of UserService.dart) to follow Dart conventions.
prefer_camel_case_method_names: true  # [reviewed] Method name does not follow lowerCamelCase convention. Non-standard casing breaks IDE autocompletion and makes the API inconsistent with Dart SDK and package conventions. {v2} Rename the method to lowerCamelCase (e.g., fetchUserData) to follow the Dart naming convention.
prefer_exception_suffix: true  # [reviewed] Exception classes missing the "Exception" suffix are harder to identify as throwable types during code review and IDE search. {v2} Rename the class to end with "Exception" so it is immediately recognizable as a throwable type in code and search results.
prefer_error_suffix: true  # [reviewed] The "Exception" suffix is verbose and inconsistent with Dart core types like StateError and ArgumentError. Use "Error" for brevity. {v2} Rename the class to end with "Error" instead of "Exception" to align with Dart core naming conventions and reduce verbosity.
prefer_boolean_prefixes_for_params: true  # [reviewed] Prefixing boolean parameters with is/has/can/should is a naming convention with no impact on code behavior or performance. Enable via the stylistic tier. {v4} Rename this boolean parameter to use a standard prefix (is, has, can, should, will, did) or suffix (Enabled, Active, Visible). Example: visible becomes isVisible.
prefer_boolean_prefixes_for_locals: true  # [reviewed] Prefixing boolean local variables with is/has/can/should is a naming convention with no impact on code behavior or performance. Enable via the stylistic tier. {v4} Rename this local boolean variable to use a standard prefix (is, has, can, should, will, did) or suffix (Enabled, Active, Visible). Example: status becomes isActive.
prefer_trailing_underscore_for_unused: true  # [reviewed] Naming unused variables with a trailing underscore is a convention. The Dart compiler handles unused variables the same either way. Enable via the stylistic tier. {v4} Rename to _ or _paramName to indicate it is unused. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_sliver_prefix: false  # Prefixing sliver widget class names with Sliver is a naming convention. It does not affect widget behavior or performance. Enable via the stylistic tier. {v5} Rename the class to start with "Sliver" (e.g., SliverHeader instead of Header) to communicate its sliver layout protocol.
prefer_correct_callback_field_name: true  # [reviewed] Using onXxx naming for callback fields is a Dart API convention. Callback naming does not affect code behavior or performance. Enable via the stylistic tier. {v5} Rename callback fields to use the 'on' prefix following Flutter convention. For example, callback becomes onCallback and tapHandler becomes onTap.
prefer_correct_handler_name: true  # [reviewed] Using handleXxx or onXxx naming for handler methods is a convention. Handler naming does not affect code behavior or performance. Enable via the stylistic tier. {v3} Rename the event handler method to start with "on" or "_on" prefix. For example, buttonPressed becomes onButtonPressed.
prefer_correct_setter_parameter_name: true  # [reviewed] Using value as the setter parameter name is a Dart convention. The parameter name does not affect setter behavior or performance. Enable via the stylistic tier. {v4} Rename the setter parameter to "value" for consistency with Dart conventions. Example: set name(String value) => _name = value;
prefer_bloc_event_suffix: false  # [reviewed] Suffixing Bloc event class names with Event is a naming convention. The suffix does not affect Bloc behavior or performance. Enable via the stylistic tier. {v2} Rename class to include Event suffix (e.g., LoadUserEvent). Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_bloc_state_suffix: false  # [reviewed] Suffixing Bloc state class names with State is a naming convention. The suffix does not affect Bloc behavior or performance. Enable via the stylistic tier. {v2} Rename class to include State suffix (e.g., UserLoadingState). Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_use_prefix: false  # [reviewed] Prefixing Flutter Hooks function names with use is a naming convention. The prefix does not affect hook behavior or performance. Enable via the stylistic tier. {v2} Rename the function to start with "use" (e.g. useMyHook) following the hooks convention, so it is recognizable as a hook and subject to hook linting rules.

# --- Error handling style ---
prefer_catch_over_on: true  # [reviewed] "on Object catch" is equivalent to a bare "catch" — both catch everything with the same static type for the exception variable. The redundant "on Object" clause adds visual noise without changing behavior. Remove it to clarify that this is an unfiltered catch-all handler. {v4} Remove the redundant "on Object" clause. A bare "catch (e)" has identical behavior and clearer intent.

# --- Code style preferences ---
prefer_no_continue_statement: true  # [reviewed] Loop body uses a continue statement to skip to the next iteration. Continue statements break the linear flow of the loop, forcing readers to mentally track which paths reach the end of the body and which jump back to the loop header. {v2} Invert the condition and wrap the remaining body in an if block, or extract the skip logic into an early return within a helper method.
prefer_single_exit_point: false  # [reviewed] Multiple return statements (early exits) make it harder to ensure cleanup, logging, and consistent resource management at the end of a function. This can lead to missed cleanup, inconsistent state, and bugs that are difficult to trace. Refactor to a single exit point so all cleanup and logging happens reliably before returning. {v1} Refactor to a single exit point: move cleanup and logging to the end, and return once.
prefer_wildcard_for_unused_param: true  # [reviewed] Unused parameter obscures intent and signals incomplete API design. Replacing it with a _ wildcard (Dart 3.7+) makes the function signature self-documenting, communicating that the parameter exists for interface conformance but is intentionally ignored in this implementation. {v4} Replace the parameter with _ to make the function signature self-documenting and signal that the value is intentionally unused.
prefer_rethrow_over_throw_e: true  # [reviewed] Using throw e resets the stack trace to the current frame, losing the original call site information. Use rethrow to preserve the full stack trace for easier debugging. {v3} Replace throw e with rethrow to preserve the original stack trace instead of resetting it to the current frame.
prefer_list_first: true  # [reviewed] Using [0] instead of .first is a stylistic choice. The .first getter calls [0] internally — there is no performance benefit. Enable via the stylistic tier. {v4} Replace [0] with .first or .firstOrNull to clearly communicate the intent of accessing the first element.
prefer_list_last: true  # [reviewed] Using [length-1] instead of .last is a stylistic choice. The .last getter does the same indexing internally — no performance benefit. Enable via the stylistic tier. {v3} Replace list[list.length - 1] with list.last to improve readability and reduce off-by-one error risk.
no_boolean_literal_compare: true  # [reviewed] Comparing a boolean to true/false literally (x == true) instead of using the value directly (x) is a stylistic choice with no correctness or performance impact. Enable via the stylistic tier. {v3} Use the boolean expression directly: write x instead of x == true, and !x instead of x == false. !x instead of x == false.
prefer_returning_conditional_expressions: true  # [reviewed] Returning a ternary expression instead of if-else is a stylistic preference. Both compile to the same code with no performance difference. Enable via the stylistic tier. {v2} Collapse to return condition ? valueA : valueB; for value returns, or return condition; when directly returning a boolean expression.
prefer_duration_constants: true  # [reviewed] Using named Duration constants instead of inline constructors is a naming convention. Both create identical Duration objects with no performance difference. Enable via the stylistic tier. {v2} Replace with the equivalent larger time unit (e.g., Duration(seconds: 60) becomes Duration(minutes: 1)) for clarity.
prefer_immediate_return: true  # [reviewed] Returning an expression directly instead of assigning to a variable first is a stylistic preference. Both produce the same compiled output. Enable via the stylistic tier. {v6} Return the expression directly instead of storing in a variable. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_for_in: true  # [reviewed] Using for-in loops instead of index-based for loops is a stylistic preference. Both have equivalent performance for most Dart collections. Enable via the stylistic tier. {v4} Replace the index-based loop with a for-in loop (for (final item in list)) to iterate directly over elements without managing an index variable.
prefer_conditional_expressions: true  # [reviewed] Using ternary expressions instead of if-else is a code shape preference. Both compile to equivalent code with no performance impact. Enable via the stylistic tier. {v4} Replace with a conditional expression (condition ? thenValue : elseValue) for concise value selection. Ternary expressions make the intent clear, reduce nesting levels, and improve code density for simple branching.
prefer_returning_condition: true  # [reviewed] Returning a condition directly instead of if-else with true/false is a simplification preference. No performance or correctness difference. Enable via the stylistic tier. {v4} Return the condition expression directly instead of assigning to a temporary variable, reducing the code to a single return statement.
prefer_returning_conditionals: true  # [reviewed] Simplifying return logic to a single conditional expression is a code shape preference. Both forms produce equivalent compiled output. Enable via the stylistic tier. {v4} Replace the if/else with return condition; (or return !condition; if the branches are swapped) to communicate the intent more concisely.
prefer_returning_shorthands: true  # [reviewed] Simplifying return expressions to shorter forms is a code style preference. Both produce equivalent compiled output with no performance impact. Enable via the stylistic tier. {v5} Convert to expression body with =>. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_pushing_conditional_expressions: true  # [reviewed] Moving conditional logic into return expressions is a code shape preference. No performance or correctness difference between forms. Enable via the stylistic tier. {v4} Move the conditional expression inside the single differing argument so the constructor or function call appears once with all shared arguments visible.
prefer_getter_over_method: false  # Using a getter instead of a zero-parameter method is a Dart API style preference. Both produce identical compiled code with no performance difference. Enable via the stylistic tier. {v4} Convert to a getter (e.g. String get name => _name;). Reserve methods for operations that have side effects or accept parameters.

# --- Function & Parameter style ---
prefer_arrow_functions: true  # [reviewed] Function body contains only a single return statement. Block syntax adds unnecessary braces and visual noise for simple expressions; convert to arrow syntax (=>) to signal a pure, single-expression return. {v3} Convert to arrow syntax (=> expression) to signal a pure, single-expression return and reduce visual noise.
prefer_all_named_parameters: true  # [reviewed] Function has 3 or more positional parameters that lack self-documenting call sites. This is an opinionated rule - not included in any tier by default. {v2} Convert positional parameters to named parameters so call sites are self-documenting and order-independent.
prefer_inline_callbacks: true  # [reviewed] Callback references a separate method, forcing readers to jump away to understand behavior. This is an opinionated rule - not included in any tier by default. {v3} Inline the callback body at the call site so the behavior is visible where the widget is constructed.
avoid_parameter_reassignment: true  # [reviewed] Parameter is being reassigned. This hides the original input value. {v3} Create a local variable instead of reassigning the parameter.

# --- Widget style ---
avoid_shrink_wrap_in_scroll: false  # shrinkWrap: true causes O(n) layout cost and defeats lazy loading. shrinkWrap: true causes O(n) layout cost and defeats lazy loading. However, shrinkWrap is sometimes required (e.g. ListView inside a Column) and is safe when paired with NeverScrollableScrollPhysics and a small bounded itemCount. This is a stylistic preference for Slivers over shrinkWrap — see avoid_shrinkwrap_in_scrollview for the context-aware rule that targets the genuinely dangerous nested-scrollable case. {v6} Use CustomScrollView with Slivers for efficient lazy loading. If this ListView is inside a Column/Row with a small bounded itemCount and NeverScrollableScrollPhysics, shrinkWrap: true is acceptable.
prefer_one_widget_per_file: false  # Multiple widget classes are defined in a single file, which makes it harder to locate widgets by filename. Move each widget class into its own file so names map directly to files for faster navigation. {v3} Move each widget class to its own file so file names map directly to widget names for faster navigation.
prefer_widget_methods_over_classes: false  # Simple widget class with a short build method detected. A separate class adds unnecessary boilerplate when the widget could be a method in the parent, giving direct access to parent state. {v2} Convert to a build method in the parent widget to eliminate class boilerplate and access parent state directly.
prefer_borderradius_circular: false  # Use BorderRadius.circular() instead of BorderRadius.all(Radius.circular()). This is an opinionated rule - not included in any tier by default. {v3} Replace BorderRadius.all(Radius.circular(r)) with BorderRadius.circular(r) for a shorter single-call equivalent.
avoid_small_text: false  # Font size is smaller than 12.0, which reduces readability for users with low vision. This is an opinionated rule - not included in any tier by default. Default minimum is 12 logical pixels. {v4} Use a font size of at least 12.0 to meet accessibility readability guidelines for body text.
prefer_sized_box_square: false  # Using SizedBox(width: x, height: x) instead of SizedBox.square(dimension: x) is a stylistic choice — same widget at runtime, no performance benefit. Enable via the stylistic tier. {v3} Replace with SizedBox.square(dimension: X) for clearer intent. Test on multiple screen sizes to verify the layout adapts correctly.
prefer_center_over_align: false  # Center is identical to Align(alignment: Alignment.center) at runtime — same class, same behavior. Purely stylistic preference with no performance benefit. Enable via the stylistic tier. {v3} Replace with Center(child: ..) for clearer intent. Test on multiple screen sizes to verify the layout adapts correctly.
prefer_spacing_over_sizedbox: false  # Using SizedBox for gaps instead of the spacing parameter is a stylistic API choice. Both achieve the same layout with no performance difference. Enable via the stylistic tier. {v4} Remove spacer children and add spacing: <value> to the. Test on multiple screen sizes to verify the layout adapts correctly.Row/Column constructor.

# --- Class & Record style ---
prefer_class_over_record_return: true  # [reviewed] Method returns a record type, which lacks named fields and dedicated methods. This is an opinionated rule - not included in any tier by default. {v4} Create a class with named fields to improve IDE support, type documentation, and long-term maintainability.
prefer_private_underscore_prefix: true  # [reviewed] Instance field is public without documentation, exposing internal state. This is an opinionated rule - not included in any tier by default. {v3} Prefix with underscore to enforce encapsulation, then expose via a getter if external access is needed.
prefer_explicit_this: false  # [reviewed] Instance field accessed without an explicit this. prefix, making it ambiguous whether the identifier refers to a local variable or a field. Add this. to clarify ownership and improve readability. {v3} Add an explicit this. prefix to every instance-field reference so readers can distinguish fields from locals.

# --- Formatting ---
prefer_trailing_comma_always: true  # [reviewed] A multi-line argument list or collection is missing a trailing comma. Add one so dart format keeps each element on its own line, producing cleaner diffs and easier reordering. {v4} Add a trailing comma so dart format keeps each argument on its own line, producing cleaner git diffs.
prefer_blank_line_before_case: false  # [reviewed] Adding blank lines before case clauses is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v4} Add blank line before this case. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_blank_line_before_constructor: true  # [reviewed] Adding blank lines before constructors is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v4} Add blank line to improve readability. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_blank_line_before_method: true  # [reviewed] Adding blank lines before methods is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v4} Add blank line to improve readability. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_blank_line_before_return: false  # [reviewed] Adding blank lines before return statements is a formatting preference with no impact on code behavior or performance. Enable via the stylistic tier. {v5} Insert a blank line before return for readability. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_trailing_comma: true  # [reviewed] Adding trailing commas in multi-line constructs is a formatting preference that affects diff readability. No performance or correctness impact. Enable via the stylistic tier. {v4} Add a trailing comma. Verify the change works correctly with existing tests and add coverage for the new behavior.
unnecessary_trailing_comma: false  # [reviewed] Removing trailing commas in single-line constructs is a formatting preference. No impact on code behavior or performance. Enable via the stylistic tier. {v4} Remove trailing comma or keep on single line. Verify the change works correctly with existing tests and add coverage for the new behavior.
double_literal_format: true  # [reviewed] Formatting double literals in a specific way (e.g., 1.0 vs 1.) is a stylistic preference. All forms represent the same value with no performance difference. Enable via the stylistic tier. {v4} Include leading zero before decimal point (e.g., 0.5). Verify the change works correctly with existing tests and add coverage for the new behavior.
format_comment_style: false  # [reviewed] Enforcing specific comment formatting conventions is a stylistic preference. Comment format has no impact on code behavior or performance. Enable via the stylistic tier. {v3} Start with capital letter and end with punctuation. Verify the change works correctly with existing tests and add coverage for the new behavior.

# --- Comments & Documentation ---
prefer_todo_format: false  # [reviewed] TODO comment is missing the required author and description format. Use TODO(author): description so the comment is trackable, searchable, and attributable to an owner. {v3} Add author name in parentheses: TODO(author): ... so the TODO is trackable and searchable by owner.
prefer_fixme_format: false  # [reviewed] FIXME comment is missing the required author tag. Without an owner, FIXMEs become orphaned and unactionable; use the format FIXME(author): description so the issue is trackable. {v3} Add author name in parentheses: FIXME(author): ... so the issue is trackable and searchable by owner.
prefer_sentence_case_comments: false  # [reviewed] Comment starts with a lowercase letter. Inconsistent capitalization in comments reduces readability and gives the codebase an unfinished appearance. {v4} Capitalize the first letter of the comment to maintain sentence-case consistency across the codebase.
prefer_period_after_doc: false  # [reviewed] Doc comment missing period at end. Incomplete sentences reduce clarity and professionalism in API docs. {v3} Add a period at the end of every doc comment sentence. Example: /// Returns the user name.
prefer_doc_comments_over_regular: true  # [reviewed] Use doc comments (///) instead of regular comments (//) for public API documentation. This is an opinionated rule - not included in any tier by default. {v5} Replace // with /// so the comment appears in IDE hover docs and can be extracted by dartdoc for API reference.
prefer_no_commented_out_code: true  # [reviewed] Commented-out code clutters the codebase. Delete it - git preserves history. Prose comments and special markers like TODO, FIXME, and test directives are automatically skipped. {v5} Delete the commented-out code. Use version control to retrieve it if needed.

# --- Testing style ---
prefer_expect_over_assert_in_tests: true  # [reviewed] An assert() call was found in test code. Assertions are silently skipped in release mode and provide poor failure messages; use expect() with matchers instead for reliable and descriptive test failures. {v3} Use expect() for assertions in tests. Example: expect(user.name, "John"). This provides better error messages and matchers than assert.

# --- Type argument style (conflicting - choose one) ---
prefer_inferred_type_arguments: false  # [reviewed] Explicit generic type arguments match what the compiler already infers from context. Redundant type parameters add visual noise without providing additional type safety, and they must be manually updated if the underlying types change. {v3} Remove the explicit type arguments and let the compiler infer them. This reduces verbosity and keeps the code in sync with the actual types automatically.
prefer_explicit_type_arguments: true  # [reviewed] Generic type without explicit type arguments. Explicit type arguments improve code clarity and prevent accidental type inference issues. Collections with types inferred from context are skipped. {v6} Add explicit type arguments to the generic type so that the intended types are visible without relying on inference.

# --- Import style (conflicting - choose one) ---
prefer_absolute_imports: false  # [reviewed] Relative import detected instead of the preferred absolute package import. Absolute imports provide a canonical path that avoids breakage when files are moved and improves cross-file searchability. {v5} Replace relative imports with absolute package: imports so every file references the same canonical path.
prefer_flat_imports: false  # [reviewed] Import block uses blank-line grouping that fragments the import list. A flat, alphabetically sorted import block is easier to scan and produces fewer merge conflicts. {v4} Remove blank lines between import groups so the entire import block stays compact and alphabetically sorted.
prefer_grouped_imports: true  # [reviewed] Imports are not grouped by type (dart:, package:, relative). Ungrouped imports make it harder to locate dependencies at a glance; organize them into dart:, package:, and relative sections separated by blank lines. {v4} Organize imports into dart:, package:, and relative groups separated by blank lines for quick scanning.
prefer_named_imports: false  # [reviewed] Package import without show/hide combinators detected. Unfiltered imports pull the entire package namespace into scope, increasing the risk of name collisions and making it unclear which symbols the file actually depends on. {v5} Use show to explicitly list imported symbols, e.g. import "package:foo/foo.dart" show Bar, Baz. This documents dependencies and prevents accidental usage of unintended symbols.
prefer_relative_imports: false  # [reviewed] An absolute package import was used for a file within the same package. Relative imports simplify refactoring and clearly signal local dependencies. Replace the absolute import with a relative path. {v6} Relative imports make refactoring easier and clearly signal local dependencies within the package.

# --- Quote style (conflicting - choose one) ---
prefer_double_quotes: false  # [reviewed] String literal uses single quotes instead of double quotes. Mixing quote styles creates inconsistent formatting that distracts during code review. {v6} Replace single quotes with double quotes across all string literals for a consistent codebase style.
prefer_single_quotes: true  # [reviewed] Double quotes detected where single quotes would suffice. Prefer single quotes for consistency with Dart style conventions and to reduce visual noise in string literals. {v6} Replace double quotes with single quotes to follow Dart style conventions and maintain codebase consistency.

# --- Apostrophe style (conflicting - choose one) ---
prefer_doc_curly_apostrophe: false  # [reviewed] Use Right Single Quotation Mark (') instead of straight apostrophe (') in documentation. This is an opinionated rule - not included in any tier by default. {v5} Replace the straight apostrophe with a Right Single Quotation Mark (U+2019) for typographic correctness.
prefer_doc_straight_apostrophe: true  # [reviewed] Use straight apostrophe (') instead of Right Single Quotation Mark (') in documentation. This is an opinionated rule - not included in any tier by default. {v4} Replace the Right Single Quotation Mark (U+2019) with a straight apostrophe (U+0027) for plain text docs.
prefer_straight_apostrophe: false  # [reviewed] A Right Single Quotation Mark (U+2019) was found where a straight apostrophe (U+0027) is expected. Curly quotes cause inconsistent string delimiters and can break tooling. Replace with a straight apostrophe. {v5} Replace the Right Single Quotation Mark (U+2019) with a straight apostrophe (U+0027) for code consistency.

# --- Member ordering (conflicting - choose one) ---
prefer_static_members_first: true  # [reviewed] A static member appears after an instance member in the class body. Mixing declaration order makes it harder to locate class-level constants and factories; move all static members above instance members. {v4} Move static declarations above instance declarations to group class-level constants and factories together.
prefer_instance_members_first: false  # [reviewed] An instance member appears after a static member in the class body. Placing instance members first highlights per-object state before shared class-level members; reorder so all instance declarations precede static ones. {v4} Move instance declarations above static declarations so per-object state is visible before shared members.
prefer_public_members_first: false  # [reviewed] A public member appears after a private member in the class body. Declaring public members first surfaces the external API at the top, making the class easier to consume. {v4} Move public declarations above private declarations so the external API is visible at the top of the class.
prefer_private_members_first: false  # [reviewed] A public member appears before a private member in the class body. Declaring private members first groups internal state at the top so implementation details are established before the public API. {v4} Move private declarations above public declarations so internal state is defined before the public surface.

# --- Opinionated prefer_* rules ---
prefer_addall_over_spread: false  # The spread operator creates a new list allocation on every use, which can be wasteful for in-place mutations. Use addAll() for an explicit imperative merge that avoids unnecessary copies. {v2} Replace the spread operator with addAll() for an explicit imperative mutation that reads naturally in method chains.
prefer_await_over_then: false  # The .then() chain obscures sequential async logic and complicates error handling. Rewrite with await for clearer control flow. {v3} Replace .then() with await to enable sequential reading, try/catch error handling, and easier debugging of async code.
prefer_blank_line_after_declarations: false  # Variable declarations run directly into the logic that follows without a visual break. A blank line separates setup from behavior and improves scanability. {v3} Insert a blank line after variable declarations to visually separate the setup block from the logic that follows.
prefer_blank_lines_between_members: false  # Class members are not separated by blank lines. Dense class bodies force readers to visually parse where one member ends and the next begins, slowing navigation. {v2} Insert a blank line between each class member so fields, methods, and constructors are visually distinct.
prefer_cascade_over_chained: false  # Consecutive method calls on the same variable repeat the target name unnecessarily. Cascade notation (..) signals that all operations mutate the same object. {v1} Rewrite consecutive calls using cascade (..) to eliminate the repeated variable name and clarify mutation intent.
prefer_chained_over_cascade: false  # Cascade notation is unfamiliar to developers from other languages and breaks builder patterns. Separate statements are explicit about each operation. {v1} Replace cascade (..) with separate statements to improve readability and maintain compatibility with builder patterns.
prefer_clip_r_superellipse: false  # ClipRRect uses circular arcs for rounded corners, which produce a visible transition between straight edges and curves. Use ClipRSuperellipse for smoother continuous corners matching iOS design language. {v2} ClipRSuperellipse provides smoother corner transitions matching iOS design language. Requires Flutter 3.32+.
prefer_clip_r_superellipse_clipper: false  # Use ClipRSuperellipse instead of ClipRRect for smoother continuous corners. This is an opinionated rule — not included in any tier by default. {v2} The custom clipper must be rewritten as CustomClipper<RSuperellipse>. Requires Flutter 3.32+.
prefer_collection_if_over_ternary: false  # Ternary operator with spread is used to conditionally include collection elements. This pattern is harder to read; use collection-if syntax instead for clearer, more idiomatic Dart. {v2} Replace the ternary-spread pattern with a collection-if expression: [if (condition) element] for cleaner syntax.
prefer_compact_class_members: false  # Unnecessary blank lines between class members inflate the class body. Compact layout lets the full class definition fit on fewer lines for a quick overview. {v2} Remove blank lines between class members so the full class definition fits on fewer lines for a quick overview.
prefer_compact_declarations: false  # Unnecessary blank line after variable declarations pushes related logic further from the variables it uses, increasing the vertical distance readers must scan. {v3} Remove the blank line after declarations to keep variable definitions close to the code that uses them.
prefer_concatenation_over_interpolation: false  # String interpolation was used where explicit concatenation is preferred. Use the + operator to build strings for a consistent style that keeps expressions visually separated from literal text. {v2} Replace $-interpolation with explicit + concatenation for a consistent string-building style.
prefer_concise_variable_names: false  # Variable name exceeds 30 characters, which reduces readability and makes code harder to scan. Shorten it to a concise name that still conveys its purpose. {v2} Shorten the variable name to 30 characters or fewer while still communicating its purpose clearly.
prefer_constructor_assertion: false  # Use a constructor assertion instead of a factory for simple debug-only precondition checks. This is an opinionated rule - not included in any tier by default. {v2} Constructor assertions run only in debug mode and keep the class constructor simple without a factory indirection.
prefer_constructor_body_assignment: false  # Constructor uses this.field shorthand which prevents adding validation or transformation logic. Use an explicit initializer list or body assignment instead to keep the constructor flexible. {v2} Assign fields inside the constructor body instead of using this.field to allow validation or transformation logic.
prefer_container_over_sizedbox: false  # A SizedBox was used where a Container would provide better consistency and easier future extension. Replace it with a Container to allow adding decoration, padding, or alignment without a widget swap. {v3} Replace SizedBox with Container so decoration, padding, or alignment can be added later without a widget swap.
prefer_curly_apostrophe: false  # Use Right Single Quotation Mark (') instead of straight apostrophe (') in strings. This is an opinionated rule - not included in any tier by default. {v4} Replace the straight apostrophe with a Right Single Quotation Mark (U+2019) for typographic polish in strings.
prefer_default_enum_case: false  # Exhaustive enum switches break at compile time when new values are added, requiring immediate updates across the codebase. A default case handles unknown values gracefully. {v1} Add a default case to handle unknown or future enum values gracefully and prevent compile-time breakage on enum changes.
prefer_descriptive_bool_names_strict: false  # Boolean should use a descriptive prefix (is, has, can, should, etc.). This rule is suitable for the pedantic tier. {v3} Rename this boolean variable, parameter, or field with a strict prefix only (isEnabled, hasData, canEdit, shouldUpdate). Action verbs like processData are not allowed. Checks all booleans.
prefer_descriptive_variable_names: false  # Variable name is shorter than 3 characters, making its purpose unclear without reading surrounding context. Use a descriptive name that communicates intent at the point of use. {v3} Rename the variable to a descriptive name that communicates its purpose without requiring surrounding context.
prefer_dot_shorthand: false  # Fully qualified enum reference detected where the type is already known from context. Use dot shorthand (.value) available in Dart 3 to reduce verbosity while preserving type safety. {v2} Replace the fully qualified EnumType.value with .value where the type is already known from context, reducing verbosity while keeping the code type-safe.
prefer_dynamic_over_object: false  # Type is declared as Object? where dynamic is intended. Object? forces explicit casts on every access which adds verbosity; use dynamic to signal that static type checking is intentionally bypassed. {v4} Replace Object? with dynamic when the variable intentionally bypasses static type checks on every access.
prefer_edgeinsets_only: false  # EdgeInsets.symmetric() hides which sides receive padding, making future per-side adjustments harder. Use EdgeInsets.only() to declare each side explicitly so values can be changed independently. {v3} Replace EdgeInsets.symmetric() with EdgeInsets.only() for explicit per-side values that are easier to adjust independently.
prefer_edgeinsets_symmetric: false  # EdgeInsets.only() was used with equal left/right or top/bottom values, which adds unnecessary repetition. Use EdgeInsets.symmetric() to express mirrored padding concisely. {v4} Replace EdgeInsets.only() with EdgeInsets.symmetric() when horizontal or vertical values are equal, for brevity.
prefer_exhaustive_enums: false  # Prefer exhaustive enum cases instead of default. Exhaustive cases catch missing logic at compile time and prevent silent failures. {v2} Remove the default branch and list every enum value explicitly so the compiler flags missing cases after additions.
prefer_expanded_over_flexible: false  # Flexible with fit: FlexFit.tight is equivalent to Expanded, adding unnecessary verbosity. Use Expanded directly for clearer intent and less boilerplate. {v3} Replace Flexible(fit: FlexFit.tight) with Expanded, which is the idiomatic shorthand for tight-fit flex children.
prefer_explicit_boolean_comparison: false  # A nullable boolean expression is used without an explicit comparison, which can hide null-is-false behavior and confuse readers. Add == true to make the intent clear and self-documenting. {v4} Add an explicit == true comparison so the nullable bool intent is clear and avoids implicit null-is-false confusion.
prefer_explicit_colors: false  # Theme.of(context).colorScheme requires a BuildContext lookup at runtime, adding indirection. Use explicit Colors constants for predictable output without runtime context dependency. {v2} Replace Theme.of(context).colorScheme with explicit Colors.* values for predictable output without runtime context.
prefer_explicit_null_assignment: false  # The ??= operator hides the null-check control flow, making it harder to debug and log. Use an explicit if-null-then-assign block for step-by-step clarity. {v3} Replace ??= with an explicit if (variable == null) variable = value; block for step-by-step clarity.
prefer_explicit_types: false  # Variable uses var instead of an explicit type annotation. Without a visible type, readers must inspect the right-hand side or hover in the IDE to determine the declared type. {v4} Replace var with the explicit type annotation so the declared type is visible without hovering or reading the initializer.
prefer_factory_for_validation: false  # Use a factory constructor for validation logic instead of constructor assertions. This is an opinionated rule - not included in any tier by default. {v2} A factory constructor can return null, a cached instance, or a subtype when validation fails, unlike assert.
prefer_fake_over_mock: false  # Test uses mock with verify(). A hand-written fake keeps the test simpler and avoids mock-framework coupling. {v4} Create a hand-written Fake subclass instead of a Mock — fakes are easier to maintain and do not require verify() calls.
prefer_fields_before_methods: false  # A method appears before a field declaration in this class. Placing fields first improves readability by showing the data model before behavior. Move all field declarations above methods. {v4} Move field declarations above method declarations so readers see the data model before the behavior.
prefer_flexible_over_expanded: false  # Expanded widget detected, which hides its fit parameter. Use Flexible with an explicit fit argument instead for greater clarity and easier adjustments to flex behavior. {v3} Replace Expanded with Flexible(fit: FlexFit.tight) so the fit parameter is always visible and easy to change later.
prefer_future_void_function_over_async_callback: false  # Prefer explicit Future<void> Function() instead of AsyncCallback. Enforces using explicit Future-returning callbacks instead of AsyncCallback. {v3} Use Future<void> Function() instead of AsyncCallback to keep the signature framework-agnostic and self-documenting.
prefer_generic_exception: false  # Custom exception classes add boilerplate without proportional benefit. Use generic Exception to keep error handling simple. {v1} Replace the custom exception with Exception to reduce class boilerplate while still conveying the error message.
prefer_given_when_then_comments: false  # Test body has three or more statements but lacks structural comments. Without Arrange/Act/Assert or Given/When/Then markers, readers must infer the setup, action, and verification phases. Add phase comments for clarity. {v1} Add "// Arrange", "// Act", "// Assert" (or Given/When/Then) comments to delineate setup, execution, and verification phases.
prefer_grouped_by_purpose: false  # Parameters alternate frequently between required and optional, scattering related arguments. Group parameters by purpose instead so callers can understand each logical group at a glance. {v2} Group constructor parameters by purpose (e.g., layout, style, callbacks) rather than required-vs-optional ordering.
prefer_grouped_expectations: false  # Isolating every assertion into its own test duplicates setup logic and inflates the test suite. Group related assertions to reduce boilerplate. {v1} Combine related assertions into a single test to share setup logic, reduce duplication, and keep the test suite concise.
prefer_guard_clauses: false  # Wrapping the entire function body in an if block obscures preconditions and increases nesting. Guard clauses make preconditions explicit and help prevent bugs. {v3} Extract the condition as a guard clause with early return at the top to make preconditions explicit and reduce nesting.
prefer_if_null_over_ternary: false  # Null-checking ternary detected where the ?? operator expresses the same intent more concisely. Replace with ?? to reduce verbosity and follow idiomatic Dart conventions. {v4} Replace the ternary null check with the ?? operator, which expresses the same intent in fewer tokens.
prefer_implicit_boolean_comparison: false  # Comparing a boolean expression to a boolean literal (== true or == false) is redundant and adds visual noise. Remove the comparison and use the expression directly for cleaner, idiomatic Dart. {v4} Remove the redundant == true or == false comparison — the expression is already a bool and reads more naturally.
prefer_initializing_formals: false  # Constructor assigns a parameter directly to a field via the initializer list. Use this.field syntax in the parameter list instead to reduce boilerplate and improve readability. {v3} Use this.field syntax in the constructor parameter list to assign the value directly without an initializer body.
prefer_interpolation_over_concatenation: false  # String concatenation with the + operator was detected where interpolation would be cleaner. Concatenation adds visual noise and is less idiomatic in Dart. Use $-interpolation for improved readability. {v2} Replace string concatenation with $-interpolation for readability and to reduce operator noise.
prefer_keys_with_lookup: false  # Map iteration uses .entries instead of .keys with explicit lookup. Iterating with .keys and map[key] is a familiar loop pattern that matches common imperative styles. {v2} Iterate with map.keys and look up each value explicitly for a familiar loop style that matches common patterns.
prefer_late_over_nullable: false  # Use late instead of nullable for lazily initialized fields that are always set before first access. This is an opinionated rule - not included in any tier by default. {v2} Declare the field as late to remove null checks — the runtime guarantees a LateInitializationError if read too early.
prefer_lower_camel_case_constants: false  # Constant name does not follow lowerCamelCase convention. Inconsistent casing breaks IDE autocompletion expectations and diverges from the Dart style guide. {v3} Rename the constant to lowerCamelCase (e.g., maxRetries) to match the Dart style-guide convention.
prefer_map_entries_iteration: false  # Iterating a map via .keys and then performing a separate map[key] lookup on each iteration duplicates work. Use map.entries to access both key and value in a single pass. {v2} Iterate with map.entries to access key and value in a single lookup instead of re-indexing via map[key].
prefer_material_theme_colors: false  # Hardcoded Colors.* constant detected in a widget color parameter. Hardcoded colors ignore the active theme and break dark mode support. Use Theme.of(context).colorScheme for consistent theming. {v2} Replace hardcoded Colors.* with Theme.of(context).colorScheme values to support dark mode and keep colors consistent.
prefer_methods_before_fields: false  # A field declaration appears before a method in this class. Placing methods first highlights the public API before implementation details. Move all method declarations above fields. {v4} Move method declarations above field declarations so the public API is visible before implementation details.
prefer_no_blank_line_before_return: false  # A blank line before the return statement adds unnecessary vertical space that separates the return value from its context. Remove it to keep the function body compact. {v3} Remove the blank line directly above the return statement to keep the function body compact and readable.
prefer_no_blank_line_inside_blocks: false  # Blank line at the start or end of a block body wastes vertical space and creates visual inconsistency with the surrounding indentation structure. {v2} Remove the leading or trailing blank line inside the block body so the code stays compact and consistently indented.
prefer_null_aware_assignment: false  # An if-null-then-assign pattern was detected that can be simplified. Replace the verbose null check and assignment block with the ??= operator for a concise, idiomatic single-expression assignment. {v3} Replace the if-null-then-assign block with the ??= operator for a single-expression null-coalescing assignment.
prefer_nullable_over_late: false  # Field uses late initialization, which risks a LateInitializationError at runtime if read before assignment. Use a nullable type instead so the compiler enforces null checks at every access point. {v4} Use a nullable type instead of late so the compiler enforces a null check at every access, preventing runtime errors.
prefer_object_over_dynamic: false  # Type is declared as dynamic, which disables static type checking and allows any member access without compile-time verification. Use Object? instead to retain type safety while still accepting any runtime type. {v4} Replace dynamic with Object? to gain static type-safety while still accepting values of any runtime type.
prefer_on_over_catch: false  # A bare "catch" clause catches all exception types indiscriminately, which can mask unexpected errors and hinder targeted recovery. Use "on ExceptionType" to restrict handling to known failures. {v1} Add an "on ExceptionType" clause to catch only expected failures and let unexpected errors propagate to the caller.
prefer_positive_conditions: false  # Prefer a positive condition with the branches swapped for readability. {v3} Invert the condition to its positive form and swap the then/else branches.
prefer_positive_conditions_first: false  # Guard clauses with negated conditions push the happy path deeper into the function. Positive conditions make the primary logic path prominent and easier to understand. {v2} Restructure to place the positive condition first so the happy path is prominent and easier to follow.
prefer_required_before_optional: false  # Required parameters appear after optional ones, forcing callers to scan past defaults to find mandatory arguments. Place required parameters first for a clearer API signature. {v2} Move required parameters before optional ones so callers see mandatory arguments first in the signature.
prefer_richtext_over_text_rich: false  # Text.rich() inherits DefaultTextStyle implicitly, which can cause unexpected styling. Use RichText instead for explicit control over the base text style without hidden theme inheritance. {v3} Replace Text.rich() with RichText for full control over the base text style without implicit DefaultTextStyle inheritance.
prefer_screaming_case_constants: false  # Constant name does not use SCREAMING_SNAKE_CASE convention. Without visual distinction, constants blend with regular variables and their immutable intent is lost. {v5} Rename the constant to SCREAMING_SNAKE_CASE (e.g., MAX_VALUE instead of maxValue) for visual distinction.
prefer_self_documenting_tests: false  # Structure comments like Arrange/Act/Assert add noise to well-written tests. Self-documenting code with clear variable names and assertions is more maintainable. {v1} Remove the structure comments and use descriptive variable names and focused assertions to make the test self-documenting.
prefer_single_blank_line_max: false  # Multiple consecutive blank lines waste vertical space and create visual gaps that break reading flow. One blank line is sufficient to separate logical sections. {v2} Collapse multiple consecutive blank lines into a single blank line to conserve vertical space in the file.
prefer_single_expectation_per_test: false  # Test contains multiple logical assertions that verify unrelated behaviors. This is an opinionated rule - not included in any tier by default. {v4} Split into multiple focused tests, each verifying one behavior, so failures pinpoint exactly which expectation broke.
prefer_sizedbox_over_container: false  # A Container is used only for width/height sizing, which adds unnecessary decoration and padding layers. Use SizedBox instead for a lighter widget with clearer intent. {v3} Replace Container with SizedBox when you only need width and height — SizedBox skips the decoration/padding layers.
prefer_specific_exceptions: false  # A generic Exception is thrown instead of a domain-specific type. Generic exceptions prevent callers from catching specific failures and limit targeted error recovery; define and throw a custom exception class. {v2} Create a custom exception class so callers can catch specific failures and provide targeted error recovery.
prefer_spread_over_addall: false  # Collection uses addAll() instead of the spread operator. The spread syntax [...list1, ...list2] is a declarative, expression-level merge that avoids mutation. {v2} Replace addAll() with the spread operator [...list1, ...list2] for a declarative, expression-level merge.
prefer_super_parameters: false  # Constructor parameter is forwarded directly to super() instead of using Dart 3 super-parameter syntax. This adds unnecessary boilerplate and repetition; use super.paramName to shorten the signature. {v3} Use Dart 3 super-parameter syntax (super.name) to forward constructor arguments without repeating the field name.
prefer_switch_statement: false  # Switch expressions limit flexibility for side effects and debugging. Switch statements support imperative logic, breakpoints, and multi-line case bodies. {v1} Replace the switch expression with a switch statement to enable side effects, multi-line cases, and debuggability.
prefer_sync_over_async_where_possible: false  # Marking a function async when it only returns a synchronous value adds unnecessary Future wrapping overhead and obscures intent. {v3} Remove the async keyword and return Future.value() directly to eliminate unnecessary Future wrapping and clarify synchronous intent.
prefer_ternary_over_collection_if: false  # Collection-if expression could be replaced with a ternary-spread pattern for explicit control over the empty-case branch and consistent syntax. {v2} Replace the collection-if with a ternary-spread expression: ...(condition ? [element] : []) for explicit control.
prefer_ternary_over_if_null: false  # The ?? operator hides the null-check branching logic, reducing visibility into both code paths. Use an explicit ternary (value != null ? value : fallback) for full control over each branch. {v5} Replace ?? with an explicit ternary (value != null ? value : fallback) for full control over both branches.
prefer_test_data_builder: false  # Complex object construction in test duplicates setup logic across multiple test cases. Builder pattern for test objects is cleaner than constructors with many parameters and makes tests more readable. {v4} Extract a TestDataBuilder class (e.g., UserBuilder().withName('Test').build()) to share setup logic across tests.
prefer_test_name_descriptive: false  # Test name is not descriptive. Rigid patterns make test failures harder to diagnose and understand. This is an opinionated rule - not included in any tier by default. {v1} Use natural, descriptive test names that explain the behavior being tested. Example: test("user can authenticate with valid credentials").
prefer_test_name_should_when: false  # Test name does not follow the "should X when Y" pattern, making it harder to understand the expected behavior and triggering condition at a glance. Restructure as "should [behavior] when [condition]". {v2} Rename the test to follow the should-when pattern: test('should [behavior] when [condition]', ...) for clarity.
prefer_text_rich_over_richtext: false  # RichText widget does not inherit DefaultTextStyle, requiring manual base style setup. Text.rich() inherits the theme automatically and produces less boilerplate. {v3} Replace RichText with Text.rich() to inherit the DefaultTextStyle and avoid manually setting the base style.
prefer_then_over_await: false  # The await keyword introduces implicit suspension points that break functional composition. Use .then() for explicit Future chaining. {v2} Replace await with .then() to maintain functional composition and make asynchronous data flow explicit in the call chain.
prefer_wheretype_over_where_is: false  # Collection uses where((e) => e is T) for type filtering, which requires a manual cast afterward. Use whereType<T>() instead to filter and cast in one step for cleaner, type-safe code. {v2} Replace where((e) => e is T) with whereType<T>() for concise, type-safe filtering without a manual cast.

# --- Variable type style (conflicting - choose one) ---
prefer_type_over_var: false  # Preferring explicit type annotations over var is a style choice. Both produce identical compiled code. Conflicts with prefer_var_over_explicit_type. Enable via the stylistic tier. {v4} Replace var with the explicit type. Verify the change works correctly with existing tests and add coverage for the new behavior.
prefer_var_over_explicit_type: false  # An explicit type annotation is redundant when the right-hand side already makes the type obvious. Use var to reduce visual noise and let the initializer communicate the type. {v3} Replace the explicit type annotation with var when the right-hand side already makes the type obvious.

# --- Control flow & collection style ---
prefer_early_return: false  # Deeply nested if blocks increase cognitive load and make code harder to follow. Early returns flatten the structure and clarify preconditions. {v7} Invert conditions and return early at the top of the function to reduce nesting and improve readability.
prefer_mutable_collections: false  # Function returns an unmodifiable collection. Immutable return types force callers to copy the collection before modification, adding allocation overhead and boilerplate. {v3} Return a plain List, Set, or Map so callers can modify the collection without needing to copy or unwrap it first.
prefer_record_over_equatable: false  # Simple Equatable class with only final fields and no custom methods detected. Dart 3 records provide built-in equality and immutability with far less boilerplate. Replace with a typedef record. {v5} Replace the Equatable subclass with a Dart 3 record: typedef ClassName = ({Type field, ...}); for less boilerplate.

# --- Other stylistic rules ---
prefer_import_group_comments: false  # Import group is missing a doc-comment section header. Adding section headers like "/// Dart imports" before each group makes the import block self-documenting and helps developers quickly identify which group a new import belongs to. {v1} Add section headers (/// Dart imports, /// Package imports, /// Relative imports) before each import group.

