# SAROPA LINTS CUSTOM CONFIG
# Settings that persist across tier changes and --reset.

# ANALYSIS SETTINGS
max_issues: 500
output: both

# PLATFORM SETTINGS
# Disable platforms your project doesn't target.
platforms:
  ios: false
  android: false
  macos: false
  web: false
  windows: false
  linux: false

# ─────────────────────────────────────────────────────────────────────────────
# RULE OVERRIDES
# ─────────────────────────────────────────────────────────────────────────────
# FORMAT: rule_name: true/false
# Add your custom rule overrides below:

avoid_barrel_files: false
avoid_non_ascii_symbols: false
# Disabled: 42 dev-time precondition asserts across 23 algorithm files; newer
# saropa_lints promoted this to WARNING and broke `pub publish --dry-run`.
avoid_assert_in_production: false
# Disabled: 49 deliberate bounds-checked substring() calls; newer saropa_lints
# promoted this to WARNING and broke `pub publish --dry-run`. See analysis_options.yaml.
avoid_string_substring: false
avoid_parameter_reassignment: true
avoid_static_state: false
avoid_unmarked_public_class: false
binary_expression_operand_order: true
double_literal_format: true
no_boolean_literal_compare: true
no_empty_string: false
no_magic_number_in_tests: false
no_magic_string_in_tests: false
prefer_all_named_parameters: false
prefer_arrow_functions: true
prefer_await_over_then: true
prefer_blank_line_after_declarations: false
prefer_blank_line_after_loop: false
prefer_blank_line_before_constructor: true
prefer_blank_line_before_else: false
prefer_blank_line_before_method: true
prefer_blank_lines_between_members: false
prefer_boolean_prefixes: true
prefer_boolean_prefixes_for_locals: false
prefer_boolean_prefixes_for_params: false
prefer_camel_case_method_names: true
prefer_cascade_over_chained: true
prefer_class_over_record_return: false
prefer_compute_for_heavy_work: false
prefer_conditional_expressions: true
prefer_correct_callback_field_name: true
prefer_correct_handler_name: true
prefer_correct_setter_parameter_name: true
prefer_descriptive_bool_names: false
prefer_descriptive_test_name: false
prefer_doc_comments_over_regular: true
prefer_doc_straight_apostrophe: true
prefer_duration_constants: true
prefer_dynamic_over_object: false
prefer_early_return: true
prefer_exception_suffix: true
prefer_expect_over_assert_in_tests: true
prefer_explicit_type_arguments: true
prefer_fields_before_methods: false
prefer_for_in: false
prefer_grouped_imports: true
prefer_if_null_over_ternary: true
prefer_immediate_return: true
prefer_implicit_boolean_comparison: true
prefer_inline_callbacks: true
prefer_interpolation_over_concatenation: true
prefer_kebab_tag_name: true
prefer_list_first: true
prefer_list_last: true
prefer_lower_camel_case_constants: true
prefer_no_blank_line_before_return: false
prefer_no_commented_out_code: true
prefer_no_continue_statement: false
prefer_null_aware_assignment: true
prefer_nullable_over_late: true
prefer_on_over_catch: true
prefer_prefixed_global_constants: false
prefer_pushing_conditional_expressions: true
prefer_readable_line_length: false
prefer_rethrow_over_throw_e: true
prefer_returning_condition: true
prefer_returning_conditional_expressions: true
prefer_returning_conditionals: true
prefer_returning_shorthands: true
prefer_secure_random: false
prefer_single_blank_line_max: true
prefer_single_quotes: true
prefer_snake_case_files: true
prefer_specific_exceptions: true
prefer_spread_over_addall: true
prefer_static_members_first: false
prefer_static_method: false
prefer_trailing_comma: true
prefer_trailing_comma_always: true
prefer_trailing_underscore_for_unused: true
prefer_type_over_var: true
prefer_wildcard_for_unused_param: true
require_https_only_test: false
require_test_description_convention: false
