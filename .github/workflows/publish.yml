name: publish

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test

      # Strict on purpose: `dart pub publish` exits 65 on validation failure
      # (e.g. an undeclared dependency). The old `|| [ $? -eq 65 ]` swallowed
      # that, so the dry run and the real publish both reported green while
      # pub.dev received nothing — the package silently stayed at 1.0.6 across
      # three "successful" releases. Let any non-zero exit fail the workflow.
      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
